            if (state.data.components.schema_registry) {
                lines.push('    # === Step 11: Schema Registry ===');
                lines.push(`    schema_registry_listener_port: ${state.data.schema_registry_listener_port}`);

                        if (plugin) lines.push(`      - ${plugin}`);

                }

            if (state.data.components.ksql) {

                if (Object.keys(state.data.ksql_custom_properties).length > 0) {

                        if (key) lines.push(`      ${key}: ${yamlScalar(value)}`);

                lines.push(`    kafka_rest_port: ${state.data.kafka_rest_port}`);

                if (state.data.c3_service_user) lines.push(`    c3_service_user: ${state.data.c3_service_user}`);
                if (state.data.c3_service_password) lines.push(`    c3_service_password: "${state.data.c3_service_password}"`);
                // C3 REST HTTPS SSL: state에 명시적으로 import된 경우만 출력 (undefined이면 생략)
                if (state.data.control_center_next_gen_ssl_enabled !== undefined && state.data.control_center_next_gen_ssl_enabled !== null) {
                    lines.push(`    control_center_next_gen_ssl_enabled: ${state.data.control_center_next_gen_ssl_enabled ? 'true' : 'false'}`);
                }
                // C3 의존성 설정 경로 (Archive 설치 시 명시 필요)
                if (state.data.c3_dependencies_config_path)

                // SSL file directory (used by cp-ansible to locate generated SSL files)

                // C3 SSL password vars (referenced as Jinja2 vars in control_center_next_gen group vars)

                lines.push(`    control_center_next_gen_dependency_alertmanager_port: ${state.data.alertmanager_port}`);

                if (state.data.c3_monitoring_interceptor_kafka_listener_name)

                // C3 custom_properties: all.vars 레벨에 출력 (host level에서 이동)

        // ============================================================
        // YAML IMPORT / PARSE
        // ============================================================
        function parseYamlAndImport(yamlText) {
            let parsed;
            try {
                parsed = jsyaml.load(yamlText);
            } catch(e) {
                return { success: false, error: 'YAML 파싱 오류: ' + e.message };
            }

            /**
             * 원본 YAML 텍스트에서 특정 dotted-key 값이 쌍따옴표로 감싸져 있는지 확인.
             * jsyaml은 파싱 후 따옴표 정보를 제거하므로, 이 함수로 원본 포맷을 복원한다.
             * @param {string} key   - YAML 키 (점 포함 가능, 예: confluent.balancer.heal.uneven.load.trigger)
             * @param {string} value - 검사할 값 문자열
             */
            function wasDoubleQuotedInYaml(key, value) {
                const escapedKey = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const escapedVal = value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                return new RegExp(`${escapedKey}:\\s*"${escapedVal}"`, 'm').test(yamlText);
            }

            /**
             * custom_properties 객체의 각 값을 순회하며,
             * 원본 YAML에서 쌍따옴표로 감싸진 값은 pre-quoted 문자열로 저장.
             * yamlScalar()는 '"value"' 형태를 그대로 통과시킨다.
             */
            function preserveCustomPropQuotes(propsObj) {
                if (!propsObj || typeof propsObj !== 'object') return propsObj;
                const result = {};
                Object.entries(propsObj).forEach(([k, v]) => {
                    const str = String(v);
                    if (wasDoubleQuotedInYaml(k, str)) {
                        result[k] = `"${str}"`; // yamlScalar가 그대로 출력
                    } else {
                        result[k] = v;
                    }
                });
                return result;
            }

            if (!parsed || typeof parsed !== 'object') {
                return { success: false, error: 'YAML 형식이 올바르지 않습니다. all: 최상위 키가 필요합니다.' };
            }

            const allVars = (parsed.all && parsed.all.vars) ? parsed.all.vars : {};
            // Support both all.children.* (standard) and top-level group keys (flat format)
            const children = Object.assign(
                {},
                (parsed.all && parsed.all.children) ? parsed.all.children : {}
            );
            // Merge top-level group entries that are not already in children
            const knownTopGroups = ['kafka_controller','kafka_broker','schema_registry','kafka_connect','ksql','kafka_rest','control_center_next_gen'];
            knownTopGroups.forEach(g => {
                if (!children[g] && parsed[g]) children[g] = parsed[g];
            });

            let importedCount = 0;

            function set(key, val) {
                if (val === undefined || val === null) return;
                state.data[key] = val;
                importedCount++;
            }

            // ── Step 1: Basic Environment ──
            if (allVars.ansible_connection !== undefined) set('ansible_connection', allVars.ansible_connection);
            if (allVars.ansible_user !== undefined) set('ansible_user', String(allVars.ansible_user));
            if (allVars.ansible_port !== undefined) set('ansible_port', Number(allVars.ansible_port));
            if (allVars.ansible_become !== undefined) set('ansible_become', Boolean(allVars.ansible_become));
            if (allVars.ansible_python_interpreter !== undefined) set('ansible_python_interpreter', String(allVars.ansible_python_interpreter));
            if (allVars.deployment_strategy !== undefined) set('deployment_strategy', allVars.deployment_strategy);
            if (allVars.ansible_strategy !== undefined) set('ansible_strategy', allVars.ansible_strategy);
            if (allVars.install_java !== undefined) set('install_java', Boolean(allVars.install_java));
            if (allVars.custom_java_path !== undefined) set('custom_java_path', String(allVars.custom_java_path));

            // ── Step 2: Installation Method ──
            if (allVars.installation_method !== undefined) set('installation_method', allVars.installation_method);
            if (allVars.confluent_package_version !== undefined) set('confluent_package_version', String(allVars.confluent_package_version));
            if (allVars.confluent_server_enabled !== undefined) set('confluent_server_enabled', Boolean(allVars.confluent_server_enabled));
            if (allVars.repository_configuration !== undefined) set('repository_configuration', allVars.repository_configuration);
            if (allVars.custom_yum_repofile_path !== undefined) set('custom_yum_repo_path', String(allVars.custom_yum_repofile_path));
            if (allVars.custom_apt_repo_filepath !== undefined) set('custom_apt_repo_path', String(allVars.custom_apt_repo_filepath));
            if (allVars.confluent_archive_file_source !== undefined) set('confluent_archive_file_source', String(allVars.confluent_archive_file_source));
            if (allVars.confluent_archive_file_remote !== undefined) set('confluent_archive_file_remote', Boolean(allVars.confluent_archive_file_remote));
            if (allVars.archive_destination_path !== undefined) set('archive_destination_path', String(allVars.archive_destination_path));
            if (allVars.archive_owner !== undefined) set('archive_owner', String(allVars.archive_owner));
            if (allVars.archive_group !== undefined) set('archive_group', String(allVars.archive_group));
            if (allVars.confluent_control_center_next_gen_package_version !== undefined) set('confluent_control_center_next_gen_package_version', String(allVars.confluent_control_center_next_gen_package_version));
            if (allVars.confluent_archive_control_center_next_gen_file_source !== undefined) set('confluent_archive_control_center_next_gen_file_source', String(allVars.confluent_archive_control_center_next_gen_file_source));
            if (allVars.confluent_archive_control_center_next_gen_file_remote !== undefined) set('confluent_archive_control_center_next_gen_file_remote', Boolean(allVars.confluent_archive_control_center_next_gen_file_remote));
            if (allVars.confluent_cli_download_enabled !== undefined) set('confluent_cli_download_enabled', Boolean(allVars.confluent_cli_download_enabled));
            if (allVars.confluent_cli_archive_file_remote !== undefined) set('confluent_cli_archive_file_remote', Boolean(allVars.confluent_cli_archive_file_remote));
            if (allVars.confluent_cli_path !== undefined) set('confluent_cli_path', String(allVars.confluent_cli_path));

            // ── Step 3: Component Detection ──
            const componentKeys = ['kafka_controller','kafka_broker','schema_registry','kafka_connect','ksql','kafka_rest','control_center_next_gen'];
            componentKeys.forEach(comp => {
                if (children[comp]) {
                    state.data.components[comp] = true;
                    importedCount++;
                }
            });

            // ── Step 3: Hosts ──
            componentKeys.forEach(comp => {
                if (!children[comp] || !children[comp].hosts) return;
                const hostsObj = children[comp].hosts;
                const hostsArray = [];
                Object.entries(hostsObj).forEach(([hostname, hostVars]) => {
                    const hv = hostVars || {};
                    const hostEntry = { hostname };
                    // Common host variables
                    if (hv.ansible_host !== undefined) hostEntry.ansible_host = String(hv.ansible_host);
                    if (hv.ip !== undefined) hostEntry.ip = String(hv.ip);
                    // Broker-specific
                    if (hv.broker_id !== undefined) hostEntry.broker_id = Number(hv.broker_id);
                    if (hv.broker_ip !== undefined) hostEntry.broker_ip = String(hv.broker_ip);
                    // Controller-specific: cp-ansible uses node_id (not kafka_controller_node_id)
                    if (hv.node_id !== undefined) hostEntry.node_id = Number(hv.node_id);
                    else if (hv.kafka_controller_node_id !== undefined) hostEntry.node_id = Number(hv.kafka_controller_node_id);
                    if (hv.node_ip !== undefined) hostEntry.node_ip = String(hv.node_ip);
                    // Schema Registry host-specific vars
                    if (hv.schema_registry_host_name !== undefined) hostEntry.schema_registry_host_name = String(hv.schema_registry_host_name);
                    if (hv.schema_registry_listener_hostname !== undefined) hostEntry.schema_registry_listener_hostname = String(hv.schema_registry_listener_hostname);
                    hostsArray.push(hostEntry);
                });
                state.data.hosts[comp] = hostsArray;
                importedCount++;
            });

            // ── Step 4: Users & Groups ──
            // Try to detect common_user_group from identical users
            const knownUsers = ['kafka_controller_user','kafka_broker_user','schema_registry_user','kafka_connect_user','ksql_user','kafka_rest_user','control_center_next_gen_user'];
            const userValues = knownUsers.map(k => allVars[k]).filter(v => v !== undefined);
            if (userValues.length > 0 && userValues.every(v => v === userValues[0])) {
                state.data.common_user_group = true;
                state.data.common_user = String(userValues[0]);
                importedCount++;
            } else {
                if (allVars.kafka_controller_user !== undefined) { state.data.component_users = state.data.component_users || {}; state.data.component_users.kafka_controller = allVars.kafka_controller_user; }
                if (allVars.kafka_broker_user !== undefined) { state.data.component_users = state.data.component_users || {}; state.data.component_users.kafka_broker = allVars.kafka_broker_user; }
            }
            const knownGroups = ['kafka_controller_group','kafka_broker_group','schema_registry_group'];
            const groupValues = knownGroups.map(k => allVars[k]).filter(v => v !== undefined);
            if (groupValues.length > 0 && groupValues.every(v => v === groupValues[0])) {
                state.data.common_group = String(groupValues[0]);
            }

            // kafka_broker_service_user/group: systemd User=/Group= for broker process
            if (allVars.kafka_broker_service_user !== undefined) set('kafka_broker_service_user', String(allVars.kafka_broker_service_user));
            if (allVars.kafka_broker_service_group !== undefined) set('kafka_broker_service_group', String(allVars.kafka_broker_service_group));

            // Log dirs
            if (allVars.kafka_broker_log_dir !== undefined) set('kafka_broker_log_dir', String(allVars.kafka_broker_log_dir));
            if (allVars.kafka_controller_log_dir !== undefined) set('kafka_controller_log_dir', String(allVars.kafka_controller_log_dir));
            if (allVars.schema_registry_log_dir !== undefined) set('schema_registry_log_dir', String(allVars.schema_registry_log_dir));
            if (allVars.kafka_connect_log_dir !== undefined) set('kafka_connect_log_dir', String(allVars.kafka_connect_log_dir));
            if (allVars.ksql_log_dir !== undefined) set('ksql_log_dir', String(allVars.ksql_log_dir));
            if (allVars.kafka_rest_log_dir !== undefined) set('kafka_rest_log_dir', String(allVars.kafka_rest_log_dir));
            if (allVars.control_center_next_gen_log_dir !== undefined) set('control_center_next_gen_log_dir', String(allVars.control_center_next_gen_log_dir));

            // ── Step 5: Listener Security ──
            // sasl_protocol in YAML is a derived value. We must reverse-engineer
            // listener_protocol and sasl_mechanism from it plus SSL indicator keys.
            // SSL is indicated by: ssl_provided_keystore_and_truststore, ssl_custom_certs, or regenerate_ca
            {
                const yamlSaslProtocol = allVars.sasl_protocol;
                const hasSsl = allVars.ssl_enabled === true
                    || allVars.ssl_provided_keystore_and_truststore === true
                    || allVars.ssl_custom_certs === true
                    || allVars.regenerate_ca !== undefined;

                if (yamlSaslProtocol !== undefined) {
                    const isSasl = yamlSaslProtocol !== 'none';
                    if (isSasl && hasSsl) {
                        state.data.listener_protocol = 'SASL_SSL';
                    } else if (isSasl) {
                        state.data.listener_protocol = 'SASL_PLAINTEXT';
                    } else if (hasSsl) {
                        state.data.listener_protocol = 'SSL';
                    } else {
                        state.data.listener_protocol = 'PLAINTEXT';
                    }
                    importedCount++;

                    // sasl_mechanism: the YAML sasl_protocol value IS the mechanism (plain, scram-sha-512, kerberos, oauth)
                    if (isSasl) {
                        state.data.sasl_mechanism = yamlSaslProtocol;
                        importedCount++;
                    }
                } else if (hasSsl) {
                    // No sasl_protocol key but SSL present → SSL (no SASL)
                    state.data.listener_protocol = 'SSL';
                    importedCount++;
                }
            }
            if (allVars.kafka_broker_custom_listeners !== undefined) set('kafka_broker_custom_listeners', allVars.kafka_broker_custom_listeners);
            if (allVars.sasl_plain_users !== undefined) set('sasl_plain_users', allVars.sasl_plain_users);

            // ── Step 6: TLS / SSL ──
            // Derive ssl_method from the specific SSL keys present in the YAML.
            // ssl_provided_keystore_and_truststore: true → 'provided-keystore'
            // ssl_custom_certs: true                     → 'custom-certs'
            // regenerate_ca: false                       → 'self-signed' (cp-ansible default is regenerate=true)
            // SSL present but none of the above         → 'self-signed'
            if (allVars.ssl_provided_keystore_and_truststore === true) {
                state.data.ssl_method = 'provided-keystore';
                importedCount++;
            } else if (allVars.ssl_custom_certs === true) {
                state.data.ssl_method = 'custom-certs';
                importedCount++;
            } else if (allVars.regenerate_ca !== undefined) {
                // regenerate_ca: false is only written for self-signed mode
                state.data.ssl_method = 'self-signed';
                importedCount++;
            }

            if (allVars.ssl_mutual_auth_enabled !== undefined) set('ssl_mutual_auth_enabled', Boolean(allVars.ssl_mutual_auth_enabled));

            // 신규 SSL 필드 (ssl_enabled 방식)
            if (allVars.ssl_enabled !== undefined) set('ssl_enabled', Boolean(allVars.ssl_enabled));
            if (allVars.ssl_keystore_and_truststore_custom_password !== undefined)
                set('ssl_keystore_and_truststore_custom_password', Boolean(allVars.ssl_keystore_and_truststore_custom_password));
            if (allVars.ssl_client_authentication !== undefined)
                set('ssl_client_authentication', String(allVars.ssl_client_authentication));

            // Per-component keystore/truststore 패스워드 (12개)
            ['kafka_controller', 'kafka_broker', 'schema_registry', 'control_center_next_gen'].forEach(comp => {
                const ks = allVars[`${comp}_keystore_storepass`];
                const kk = allVars[`${comp}_keystore_keypass`];
                const ts = allVars[`${comp}_truststore_storepass`];
                if (ks !== undefined) set(`${comp}_keystore_storepass`, String(ks));
                if (kk !== undefined) set(`${comp}_keystore_keypass`, String(kk));
                if (ts !== undefined) set(`${comp}_truststore_storepass`, String(ts));
            });

            // Listener name refs
            if (allVars.kafka_broker_inter_broker_listener_name !== undefined)
                set('kafka_broker_inter_broker_listener_name', String(allVars.kafka_broker_inter_broker_listener_name));
            if (allVars.kafka_broker_rest_proxy_listener_name !== undefined)
                set('kafka_broker_rest_proxy_listener_name', String(allVars.kafka_broker_rest_proxy_listener_name));
            if (allVars.schema_registry_kafka_listener_name !== undefined)
                set('schema_registry_kafka_listener_name', String(allVars.schema_registry_kafka_listener_name));
            if (allVars.control_center_next_gen_kafka_listener_name !== undefined)
                set('control_center_next_gen_kafka_listener_name', String(allVars.control_center_next_gen_kafka_listener_name));

            // C3 추가 설정
            if (allVars.control_center_next_gen_mds_cert_auth_only !== undefined)
                set('control_center_next_gen_mds_cert_auth_only', Boolean(allVars.control_center_next_gen_mds_cert_auth_only));

            // 컴포넌트 LDAP 사용자 (all.vars 직접 값)
            if (allVars.control_center_next_gen_ldap_user !== undefined)
                set('control_center_next_gen_ldap_user', String(allVars.control_center_next_gen_ldap_user));
            if (allVars.control_center_next_gen_ldap_password !== undefined)
                set('control_center_next_gen_ldap_password', String(allVars.control_center_next_gen_ldap_password));
            if (allVars.schema_registry_ldap_user !== undefined)
                set('schema_registry_ldap_user', String(allVars.schema_registry_ldap_user));
            if (allVars.schema_registry_ldap_password !== undefined)
                set('schema_registry_ldap_password', String(allVars.schema_registry_ldap_password));

            // metrics_reporter_enabled
            if (allVars.kafka_controller_metrics_reporter_enabled !== undefined)
                set('kafka_controller_metrics_reporter_enabled', Boolean(allVars.kafka_controller_metrics_reporter_enabled));
            if (allVars.kafka_broker_metrics_reporter_enabled !== undefined)
                set('kafka_broker_metrics_reporter_enabled', Boolean(allVars.kafka_broker_metrics_reporter_enabled));

            // SSL cert/keystore paths: YAML keys use *_filepath suffixes, state uses *_path names
            if (allVars.ssl_keystore_filepath !== undefined) set('ssl_keystore_path', String(allVars.ssl_keystore_filepath));
            if (allVars.ssl_keystore_store_password !== undefined) set('ssl_keystore_password', String(allVars.ssl_keystore_store_password));
            if (allVars.ssl_truststore_filepath !== undefined) set('ssl_truststore_path', String(allVars.ssl_truststore_filepath));
            if (allVars.ssl_truststore_password !== undefined) set('ssl_truststore_password', String(allVars.ssl_truststore_password));
            if (allVars.ssl_ca_cert_filepath !== undefined) set('ssl_ca_cert_path', String(allVars.ssl_ca_cert_filepath));
            if (allVars.ssl_signed_cert_filepath !== undefined) set('ssl_signed_cert_path', String(allVars.ssl_signed_cert_filepath));
            if (allVars.ssl_key_filepath !== undefined) set('ssl_key_path', String(allVars.ssl_key_filepath));
            if (allVars.ssl_key_password !== undefined) set('ssl_key_password', String(allVars.ssl_key_password));
            if (allVars.ssl_provided_keystore_and_truststore_remote_src !== undefined) set('ssl_provided_keystore_and_truststore_remote_src', Boolean(allVars.ssl_provided_keystore_and_truststore_remote_src));
            if (allVars.ssl_custom_certs_remote_src !== undefined) set('ssl_custom_certs_remote_src', Boolean(allVars.ssl_custom_certs_remote_src));

            // ── Step 7: Authorization / RBAC ──
            // rbac_enabled in YAML maps to state.data.authorization_type ('rbac' | 'none')
            if (allVars.rbac_enabled !== undefined) {
                state.data.authorization_type = allVars.rbac_enabled ? 'rbac' : 'none';
                importedCount++;
            }
            if (allVars.mds_super_user !== undefined) set('mds_super_user', String(allVars.mds_super_user));
            if (allVars.mds_super_user_password !== undefined) set('mds_super_user_password', String(allVars.mds_super_user_password));
            // mds_ldap_user: MDS bind account for LDAP (output by generateYaml under RBAC section)
            if (allVars.mds_ldap_user !== undefined) set('mds_ldap_user', String(allVars.mds_ldap_user));
            if (allVars.mds_ldap_password !== undefined) set('mds_ldap_password', String(allVars.mds_ldap_password));
            if (allVars.rbac_super_users !== undefined) set('rbac_super_users', allVars.rbac_super_users);
            if (allVars.erp_enabled !== undefined) set('erp_enabled', Boolean(allVars.erp_enabled));
            if (allVars.sr_service_user !== undefined) set('sr_service_user', String(allVars.sr_service_user));
            if (allVars.sr_service_password !== undefined) set('sr_service_password', String(allVars.sr_service_password));
            if (allVars.create_mds_certs !== undefined) set('create_mds_certs', Boolean(allVars.create_mds_certs));
            if (allVars.token_services_public_pem_file !== undefined) set('token_services_public_pem_file', String(allVars.token_services_public_pem_file));
            if (allVars.token_services_private_pem_file !== undefined) set('token_services_private_pem_file', String(allVars.token_services_private_pem_file));
            if (allVars.kafka_broker_rest_proxy_enabled !== undefined) set('kafka_broker_rest_proxy_enabled', Boolean(allVars.kafka_broker_rest_proxy_enabled));
            // mds_broker_listener
            if (allVars.mds_broker_listener) {
                const mbl = allVars.mds_broker_listener;
                if (mbl.ssl_enabled !== undefined) set('mds_broker_listener_ssl_enabled', Boolean(mbl.ssl_enabled));
                if (mbl.ssl_mutual_auth_enabled !== undefined) set('mds_broker_listener_ssl_mutual_auth_enabled', Boolean(mbl.ssl_mutual_auth_enabled));
                if (mbl.sasl_protocol !== undefined) set('mds_broker_listener_sasl_protocol', String(mbl.sasl_protocol));
            }

            // ── Step 8: LDAP ──
            // YAML keys: ldap_url, ldap_base_dn, ldap_user_search_base, ldap_group_search_base,
            //            ldap_bind_dn, ldap_bind_password, ldap_user_name_attribute, etc.
            // Set ldap_enabled = true when any LDAP key is present
            if (allVars.ldap_url !== undefined) {
                set('ldap_url', String(allVars.ldap_url));
                state.data.ldap_enabled = true;
                importedCount++;
            }
            if (allVars.ldap_base_dn !== undefined) set('ldap_base_dn', String(allVars.ldap_base_dn));
            if (allVars.ldap_bind_dn !== undefined) set('ldap_bind_dn', String(allVars.ldap_bind_dn));
            if (allVars.ldap_bind_password !== undefined) set('ldap_bind_password', String(allVars.ldap_bind_password));
            if (allVars.ldap_user_search_base !== undefined) set('ldap_user_search_base', String(allVars.ldap_user_search_base));
            if (allVars.ldap_group_search_base !== undefined) set('ldap_group_search_base', String(allVars.ldap_group_search_base));
            if (allVars.ldap_user_name_attribute !== undefined) set('ldap_user_name_attribute', String(allVars.ldap_user_name_attribute));
            if (allVars.ldap_user_object_class !== undefined) set('ldap_user_object_class', String(allVars.ldap_user_object_class));
            if (allVars.ldap_group_object_class !== undefined) set('ldap_group_object_class', String(allVars.ldap_group_object_class));
            if (allVars.ldap_group_member_attribute !== undefined) set('ldap_group_member_attribute', String(allVars.ldap_group_member_attribute));
            if (allVars.ldap_group_name_attribute !== undefined) set('ldap_group_name_attribute', String(allVars.ldap_group_name_attribute));
            if (allVars.ldap_search_mode !== undefined) set('ldap_search_mode', String(allVars.ldap_search_mode));
            if (allVars.ldap_group_member_attribute_pattern !== undefined) set('ldap_group_member_attribute_pattern', String(allVars.ldap_group_member_attribute_pattern));

            // ── Step 9: C3 SSO / OIDC ──
            if (allVars.sso_mode !== undefined) set('sso_mode', allVars.sso_mode);
            // oidc_idp_issuer_url in YAML → state.data.oidc_issuer
            if (allVars.oidc_idp_issuer_url !== undefined) set('oidc_issuer', String(allVars.oidc_idp_issuer_url));
            if (allVars.oidc_client_id !== undefined) set('oidc_client_id', String(allVars.oidc_client_id));
            if (allVars.oidc_client_secret !== undefined) set('oidc_client_secret', String(allVars.oidc_client_secret));
            if (allVars.oidc_groups_claim !== undefined) set('oidc_groups_claim_name', String(allVars.oidc_groups_claim));

            // ── Step 10: Broker custom_properties ──
            // all.vars 레벨 우선 처리 (가장 일반적인 cp-ansible 패턴)
            {
                let brokerProps = null;
                if (allVars.kafka_broker_custom_properties !== undefined) {
                    brokerProps = Object.assign({}, allVars.kafka_broker_custom_properties);
                }
                // kafka_broker 그룹 레벨 vars로 덮어쓰기 (있을 경우)
                if (children.kafka_broker && children.kafka_broker.vars && children.kafka_broker.vars.kafka_broker_custom_properties) {
                    brokerProps = Object.assign({}, brokerProps, children.kafka_broker.vars.kafka_broker_custom_properties);
                }
                if (brokerProps !== null) {
                    // log.dirs는 Step 4 전용 state 필드로 분리하여 UI에서 확인 가능하게 처리
                    if (brokerProps['log.dirs']) {
                        set('kafka_broker_log_dirs', String(brokerProps['log.dirs']));
                        delete brokerProps['log.dirs']; // generateYaml이 kafka_broker_log_dirs로 재주입하므로 중복 제거
                    }
                    // 원본 YAML의 쌍따옴표 보존 (예: confluent.balancer.heal.uneven.load.trigger: "EMPTY_BROKER")
                    set('broker_custom_properties', preserveCustomPropQuotes(brokerProps));
                }
            }

            // kafka_controller_custom_properties: all.vars 레벨 + 그룹 레벨 모두 처리
            {
                let ctrlProps = null;
                if (allVars.kafka_controller_custom_properties !== undefined) {
                    ctrlProps = Object.assign({}, allVars.kafka_controller_custom_properties);
                }
                // kafka_controller 그룹 레벨 vars로 덮어쓰기 (있을 경우)
                if (children.kafka_controller && children.kafka_controller.vars && children.kafka_controller.vars.kafka_controller_custom_properties) {
                    ctrlProps = Object.assign({}, ctrlProps, children.kafka_controller.vars.kafka_controller_custom_properties);
                }
                if (ctrlProps !== null) {
                    // log.dirs는 Step 4 전용 state 필드로 분리하여 UI에서 확인 가능하게 처리
                    if (ctrlProps['log.dirs']) {
                        set('kafka_controller_log_dirs', String(ctrlProps['log.dirs']));
                        delete ctrlProps['log.dirs']; // generateYaml이 kafka_controller_log_dirs로 재주입하므로 중복 제거
                    }
                    // 원본 YAML의 쌍따옴표 보존
                    set('kafka_controller_custom_properties', preserveCustomPropQuotes(ctrlProps));
                }
            }

            // ── Step 11: Schema Registry ──
            if (allVars.schema_registry_custom_properties !== undefined) set('schema_registry_custom_properties', preserveCustomPropQuotes(allVars.schema_registry_custom_properties));
            if (allVars.schema_registry_listener_port !== undefined) set('schema_registry_listener_port', Number(allVars.schema_registry_listener_port));
            if (allVars.schema_registry_config_prefix !== undefined) set('schema_registry_config_prefix', String(allVars.schema_registry_config_prefix));
            if (children.schema_registry && children.schema_registry.vars) {
                const srVars = children.schema_registry.vars;
                if (srVars.schema_registry_listener_port !== undefined) set('schema_registry_listener_port', Number(srVars.schema_registry_listener_port));
                if (srVars.schema_registry_config_prefix !== undefined) set('schema_registry_config_prefix', String(srVars.schema_registry_config_prefix));
                // Fix 8: kafkastore.topic is a dotted key under schema_registry.vars
                if (srVars['kafkastore.topic'] !== undefined) set('schema_registry_kafkastore_topic', String(srVars['kafkastore.topic']));
            }

            // ── Step 12: C3 all.vars config fields (Fix 10+11) ──
            // Service accounts
            if (allVars.c3_service_user !== undefined) set('c3_service_user', String(allVars.c3_service_user));
            if (allVars.c3_service_password !== undefined) set('c3_service_password', String(allVars.c3_service_password));
            // C3 SSL password vars (referenced as Jinja2 vars in group-level SSL)
            if (allVars.c3_ssl_keystore_password !== undefined) set('c3_ssl_keystore_password', String(allVars.c3_ssl_keystore_password));
            if (allVars.c3_ssl_key_password !== undefined) set('c3_ssl_key_password', String(allVars.c3_ssl_key_password));
            if (allVars.c3_ssl_truststore_password !== undefined) set('c3_ssl_truststore_password', String(allVars.c3_ssl_truststore_password));
            // C3 runtime config
            if (allVars.control_center_next_gen_authentication_type !== undefined) set('c3_authentication_type', String(allVars.control_center_next_gen_authentication_type));
            if (allVars.control_center_next_gen_data_dir !== undefined) set('c3_data_dir', String(allVars.control_center_next_gen_data_dir));
            if (allVars.control_center_next_gen_streams_kafka_listener_name !== undefined) set('c3_streams_kafka_listener_name', String(allVars.control_center_next_gen_streams_kafka_listener_name));
            if (allVars.control_center_next_gen_monitoring_interceptor_kafka_listener_name !== undefined) set('c3_monitoring_interceptor_kafka_listener_name', String(allVars.control_center_next_gen_monitoring_interceptor_kafka_listener_name));
            if (allVars.control_center_next_gen_dependencies_config_path !== undefined) set('c3_dependencies_config_path', String(allVars.control_center_next_gen_dependencies_config_path));
            if (allVars.control_center_next_gen_ssl_enabled !== undefined) set('control_center_next_gen_ssl_enabled', Boolean(allVars.control_center_next_gen_ssl_enabled));
            if (allVars.ssl_file_dir !== undefined) set('ssl_file_dir', String(allVars.ssl_file_dir));

            // ── Step 14: Advanced ──
            if (allVars.confluent_license !== undefined) set('confluent_license', String(allVars.confluent_license));
            if (allVars.secrets_protection_enabled !== undefined) set('secrets_protection_enabled', Boolean(allVars.secrets_protection_enabled));
            if (allVars.secrets_protection_masterkey !== undefined) set('secrets_protection_masterkey', String(allVars.secrets_protection_masterkey));
            if (allVars.secrets_protection_security_file !== undefined) set('secrets_protection_security_file', String(allVars.secrets_protection_security_file));
            if (allVars.regenerate_masterkey !== undefined) set('regenerate_masterkey', Boolean(allVars.regenerate_masterkey));
            if (allVars.rbac_enabled_public_pem_path !== undefined) set('rbac_enabled_public_pem_path', String(allVars.rbac_enabled_public_pem_path));
            if (allVars.rbac_enabled_private_pem_path !== undefined) set('rbac_enabled_private_pem_path', String(allVars.rbac_enabled_private_pem_path));

            // ── Step 13: JMX Exporter ──
            if (allVars.jmxexporter_jar_url !== undefined) set('jmxexporter_jar_url', String(allVars.jmxexporter_jar_url));
            if (allVars.jmxexporter_jar_path !== undefined) set('jmxexporter_jar_path', String(allVars.jmxexporter_jar_path));
            if (allVars.jmxexporter_url_remote !== undefined) set('jmxexporter_url_remote', Boolean(allVars.jmxexporter_url_remote));
            if (allVars.jmxexporter_config_path !== undefined) set('jmxexporter_config_path', String(allVars.jmxexporter_config_path));
            // per-component JMX config path overrides
            if (allVars.kafka_broker_jmxexporter_config_path !== undefined) set('kafka_broker_jmxexporter_config_path', String(allVars.kafka_broker_jmxexporter_config_path));
            if (allVars.kafka_broker_jmxexporter_config_source_path !== undefined) set('kafka_broker_jmxexporter_config_source_path', String(allVars.kafka_broker_jmxexporter_config_source_path));
            if (allVars.kafka_controller_jmxexporter_config_path !== undefined) set('kafka_controller_jmxexporter_config_path', String(allVars.kafka_controller_jmxexporter_config_path));
            if (allVars.kafka_controller_jmxexporter_config_source_path !== undefined) set('kafka_controller_jmxexporter_config_source_path', String(allVars.kafka_controller_jmxexporter_config_source_path));
            if (allVars.kafka_broker_jmxexporter_enabled !== undefined) set('kafka_broker_jmxexporter_enabled', Boolean(allVars.kafka_broker_jmxexporter_enabled));
            if (allVars.kafka_controller_jmxexporter_enabled !== undefined) set('kafka_controller_jmxexporter_enabled', Boolean(allVars.kafka_controller_jmxexporter_enabled));
            if (allVars.kafka_broker_jmxexporter_port !== undefined) set('kafka_broker_jmxexporter_port', String(allVars.kafka_broker_jmxexporter_port));
            if (allVars.kafka_controller_jmxexporter_port !== undefined) set('kafka_controller_jmxexporter_port', String(allVars.kafka_controller_jmxexporter_port));
            if (allVars.schema_registry_jmxexporter_enabled !== undefined) set('schema_registry_jmxexporter_enabled', Boolean(allVars.schema_registry_jmxexporter_enabled));
            if (allVars.control_center_next_gen_jmxexporter_enabled !== undefined) set('control_center_next_gen_jmxexporter_enabled', Boolean(allVars.control_center_next_gen_jmxexporter_enabled));

            // ── Fix 12: C3 group-level SSL mode import ──
            // Detect 'custom password only' mode:
            //   ssl_provided_keystore_and_truststore: false + ssl_keystore_and_truststore_custom_password: true
            // This is different from c3_ssl_provided_keystore (which has keystore filepaths).
            if (children.control_center_next_gen && children.control_center_next_gen.vars) {
                const c3GVars = children.control_center_next_gen.vars;
                if (c3GVars.ssl_provided_keystore_and_truststore === false
                    && c3GVars.ssl_keystore_and_truststore_custom_password === true) {
                    state.data.c3_ssl_custom_password_only = true;
                    importedCount++;
                } else if (c3GVars.ssl_provided_keystore_and_truststore === true) {
                    state.data.c3_ssl_provided_keystore = true;
                    importedCount++;
                    if (c3GVars.ssl_keystore_filepath !== undefined) set('c3_ssl_keystore_path', String(c3GVars.ssl_keystore_filepath));
                    if (c3GVars.ssl_truststore_filepath !== undefined) set('c3_ssl_truststore_path', String(c3GVars.ssl_truststore_filepath));
                }
            }

            // ── Step 13: Service Environment Overrides (JAVA_HOME, heap opts) ──
            // Helper: strip surrounding double-quotes from env values like "-Xms4g -Xmx4g"
            function stripEnvQuotes(v) {
                if (typeof v !== 'string') return String(v);
                return v.replace(/^"(.*)"$/, '$1');
            }
            {
                const brokerSvcEnv = allVars.kafka_broker_service_environment_overrides;
                if (brokerSvcEnv && typeof brokerSvcEnv === 'object') {
                    if (brokerSvcEnv.JAVA_HOME) set('kafka_broker_java_home', String(brokerSvcEnv.JAVA_HOME));
                    if (brokerSvcEnv.KAFKA_HEAP_OPTS) set('kafka_broker_heap_opts', stripEnvQuotes(brokerSvcEnv.KAFKA_HEAP_OPTS));
                    if (brokerSvcEnv.KAFKA_JMX_OPTS) set('kafka_broker_jmx_opts', stripEnvQuotes(brokerSvcEnv.KAFKA_JMX_OPTS));
                }
            }
            {
                const ctrlSvcEnv = allVars.kafka_controller_service_environment_overrides;
                if (ctrlSvcEnv && typeof ctrlSvcEnv === 'object') {
                    if (ctrlSvcEnv.JAVA_HOME) set('kafka_controller_java_home', String(ctrlSvcEnv.JAVA_HOME));
                    if (ctrlSvcEnv.KAFKA_HEAP_OPTS) set('kafka_controller_heap_opts', stripEnvQuotes(ctrlSvcEnv.KAFKA_HEAP_OPTS));
                    if (ctrlSvcEnv.KAFKA_JMX_OPTS) set('kafka_controller_jmx_opts', stripEnvQuotes(ctrlSvcEnv.KAFKA_JMX_OPTS));
                }
            }
            {
                const srSvcEnv = allVars.schema_registry_service_environment_overrides;
                if (srSvcEnv && typeof srSvcEnv === 'object') {
                    if (srSvcEnv.JAVA_HOME) set('schema_registry_java_home', String(srSvcEnv.JAVA_HOME));
                    if (srSvcEnv.SCHEMA_REGISTRY_HEAP_OPTS) set('schema_registry_heap_opts', stripEnvQuotes(srSvcEnv.SCHEMA_REGISTRY_HEAP_OPTS));
                    if (srSvcEnv.SCHEMA_REGISTRY_OPTS) set('schema_registry_opts', stripEnvQuotes(srSvcEnv.SCHEMA_REGISTRY_OPTS));
                }
            }
            {
                const c3SvcEnv = allVars.control_center_next_gen_service_environment_overrides;
                if (c3SvcEnv && typeof c3SvcEnv === 'object') {
                    if (c3SvcEnv.JAVA_HOME) set('c3_java_home', String(c3SvcEnv.JAVA_HOME));
                    if (c3SvcEnv.CONTROL_CENTER_HEAP_OPTS) set('c3_heap_opts', stripEnvQuotes(c3SvcEnv.CONTROL_CENTER_HEAP_OPTS));
                    if (c3SvcEnv.CONTROL_CENTER_OPTS) set('c3_opts', stripEnvQuotes(c3SvcEnv.CONTROL_CENTER_OPTS));
                }
            }
            {
                const promSvcEnv = allVars.control_center_next_gen_dependency_prometheus_service_environment_overrides;
                if (promSvcEnv && typeof promSvcEnv === 'object') {
                    if (promSvcEnv.PROMETHEUS_HOST) set('prometheus_host', String(promSvcEnv.PROMETHEUS_HOST));
                    if (promSvcEnv.TSDB_PATH) set('prometheus_tsdb_path', String(promSvcEnv.TSDB_PATH));
                    if (promSvcEnv.LOG_PATH) set('prometheus_log_path', String(promSvcEnv.LOG_PATH));
                    if (promSvcEnv.METRICS_RETENTION_DAYS) set('metrics_retention_days', String(promSvcEnv.METRICS_RETENTION_DAYS));
                    if (promSvcEnv.ExecStart) set('prometheus_exec_start', String(promSvcEnv.ExecStart));
                }
            }
            {
                const amSvcEnv = allVars.control_center_next_gen_dependency_alertmanager_service_environment_overrides;
                if (amSvcEnv && typeof amSvcEnv === 'object') {
                    if (amSvcEnv.ExecStart) set('alertmanager_exec_start', String(amSvcEnv.ExecStart));
                    if (amSvcEnv.ALERTMANAGER_HOST) set('alertmanager_host', String(amSvcEnv.ALERTMANAGER_HOST));
                    if (amSvcEnv.STORAGE_PATH) set('alertmanager_storage_path', String(amSvcEnv.STORAGE_PATH));
                    if (amSvcEnv.LOG_PATH) set('alertmanager_log_path', String(amSvcEnv.LOG_PATH));
                    if (amSvcEnv.WEB_LISTEN_ADDRESS) set('alertmanager_web_listen_address', String(amSvcEnv.WEB_LISTEN_ADDRESS));
                }
            }

            // ── Fix 7: Import C3 control_center_next_gen_custom_properties (all.vars + host-level) ──
            // Extract known OIDC state keys; everything else → c3_custom_properties (values stored via yamlScalar for round-trip safety)
            {
                const OIDC_KEY_MAP = {
                    'confluent.controlcenter.auth.sso.mode': (v) => {
                        state.data.sso_mode = String(v).toLowerCase(); importedCount++; return true;
                    },
                    'confluent.controlcenter.rest.authentication.method': (v) => {
                        // BEARER = OIDC mode; absorbed into control_center_oidc_enabled detection
                        return String(v).toUpperCase() === 'BEARER';
                    },
                    'confluent.controlcenter.auth.session.expiration.ms': (v) => {
                        set('c3_session_expiration_ms', String(v)); return true;
                    },
                    'confluent.oidc.idp.client.id': (v) => { set('oidc_client_id', String(v)); return true; },
                    'confluent.oidc.idp.client.secret': (v) => { set('oidc_client_secret', String(v)); return true; },
                    'confluent.oidc.idp.issuer': (v) => { set('oidc_issuer', String(v)); return true; },
                    'confluent.oidc.idp.jwks.endpoint.uri': (v) => { set('oidc_jwks_uri', String(v)); return true; },
                    'confluent.oidc.idp.authorize.base.endpoint.uri': (v) => { set('oidc_authorize_uri', String(v)); return true; },
                    'confluent.oidc.idp.token.base.endpoint.uri': (v) => { set('oidc_token_uri', String(v)); return true; },
                    'confluent.oidc.idp.sub.claim.name': (v) => { set('oidc_sub_claim_name', String(v)); return true; },
                    'confluent.oidc.idp.groups.claim.name': (v) => { set('oidc_groups_claim_name', String(v)); return true; },
                    'confluent.oidc.idp.groups.claim.scope': (v) => { set('oidc_groups_claim_scope', String(v)); return true; },
                    'confluent.oidc.idp.refresh.token.enabled': (v) => {
                        state.data.oidc_refresh_token_enabled = (String(v) === 'true' || v === true);
                        importedCount++; return true;
                    },
                    'confluent.oidc.session.token.expiry.ms': (v) => { set('oidc_session_token_expiry_ms', String(v)); return true; },
                    'confluent.oidc.session.max.timeout.ms': (v) => { set('oidc_session_max_timeout_ms', String(v)); return true; },
                };
                let oidcDetected = false;
                const c3CustomProps = {};

                // 1) allVars 레벨 control_center_next_gen_custom_properties 처리
                if (allVars.control_center_next_gen_custom_properties !== undefined) {
                    Object.entries(allVars.control_center_next_gen_custom_properties).forEach(([k, v]) => {
                        if (v === null || v === undefined) return;
                        const handler = OIDC_KEY_MAP[k];
                        if (handler) {
                            if (handler(v)) oidcDetected = true;
                        } else {
                            c3CustomProps[k] = yamlScalar(String(v));
                        }
                    });
                }

                // 2) host 레벨 control_center_next_gen_custom_properties 처리 (host-level이 allVars를 덮어씀)
                if (children.control_center_next_gen && children.control_center_next_gen.hosts) {
                    Object.values(children.control_center_next_gen.hosts).forEach(hostVars => {
                        if (!hostVars || !hostVars.control_center_next_gen_custom_properties) return;
                        Object.entries(hostVars.control_center_next_gen_custom_properties).forEach(([k, v]) => {
                            if (v === null || v === undefined) return;
                            const handler = OIDC_KEY_MAP[k];
                            if (handler) {
                                if (handler(v)) oidcDetected = true;
                            } else {
                                // Store with yamlScalar so values round-trip through generate correctly
                                c3CustomProps[k] = yamlScalar(String(v));
                            }
                        });
                    });
                }

                if (Object.keys(c3CustomProps).length > 0) set('c3_custom_properties', c3CustomProps);
                if (oidcDetected) { state.data.control_center_oidc_enabled = true; importedCount++; }
            }

            // Detect broker_collocated: if same hostnames appear in both kafka_controller and kafka_broker
            if (children.kafka_controller && children.kafka_broker) {
                const ctrlHosts = Object.keys(children.kafka_controller.hosts || {});
                const brokerHosts = Object.keys(children.kafka_broker.hosts || {});
                const overlap = ctrlHosts.filter(h => brokerHosts.includes(h));
                if (overlap.length > 0 && overlap.length === ctrlHosts.length) {
                    state.data.broker_collocated = true;
                } else if (overlap.length === 0) {
                    state.data.broker_collocated = false;
                }
            }

            return { success: true, importedCount };
        }

        // ── Import Modal Logic ──
        function openImportModal() {
            document.getElementById('importModal').classList.remove('hidden');
            document.getElementById('importError').classList.add('hidden');
            document.getElementById('importSummary').classList.add('hidden');
            document.getElementById('importFileName').textContent = '선택된 파일 없음';
            document.getElementById('yamlFileInput').value = '';
            document.getElementById('yamlPasteInput').value = '';
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.add('hidden');
        }

        function initImportModal() {
            // Tab switching
            document.querySelectorAll('.import-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.import-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.import-tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    const targetId = tab.dataset.tab === 'file' ? 'importFileTab' : 'importPasteTab';
                    document.getElementById(targetId).classList.add('active');
                });
            });

            // File selection
            document.getElementById('yamlFileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    document.getElementById('importFileName').textContent = file.name;
                }
            });

            // Drag and drop on file label
            const fileLabel = document.querySelector('.import-file-label');
            fileLabel.addEventListener('dragover', (e) => { e.preventDefault(); fileLabel.style.borderColor = 'var(--accent)'; });
            fileLabel.addEventListener('dragleave', () => { fileLabel.style.borderColor = ''; });
            fileLabel.addEventListener('drop', (e) => {
                e.preventDefault();
                fileLabel.style.borderColor = '';
                const file = e.dataTransfer.files[0];
                if (file) {
                    document.getElementById('importFileName').textContent = file.name;
                    // Transfer to input
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    document.getElementById('yamlFileInput').files = dt.files;
                }
            });

            // Submit
            document.getElementById('importSubmit').addEventListener('click', () => {
                const activeTab = document.querySelector('.import-tab.active').dataset.tab;
                const errorEl = document.getElementById('importError');
                const summaryEl = document.getElementById('importSummary');
                errorEl.classList.add('hidden');
                summaryEl.classList.add('hidden');

                if (activeTab === 'file') {
                    const fileInput = document.getElementById('yamlFileInput');
                    if (!fileInput.files || fileInput.files.length === 0) {
                        errorEl.textContent = '파일을 선택해 주세요.';
                        errorEl.classList.remove('hidden');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const result = parseYamlAndImport(e.target.result);
                        if (!result.success) {
                            errorEl.textContent = result.error;
                            errorEl.classList.remove('hidden');
                        } else {
                            summaryEl.textContent = `✅ ${result.importedCount}개 항목을 가져왔습니다. 각 스텝을 확인하세요.`;
                            summaryEl.classList.remove('hidden');
                            setTimeout(() => {
                                closeImportModal();
                                renderStepBar();
                                renderStepContent();
                                updateYamlPreview();
                                showToast(`hosts.yml 가져오기 완료: ${result.importedCount}개 항목`);
                            }, 1000);
                        }
                    };
                    reader.readAsText(fileInput.files[0]);
                } else {
                    const yamlText = document.getElementById('yamlPasteInput').value.trim();
                    if (!yamlText) {
                        errorEl.textContent = 'YAML 내용을 입력해 주세요.';
                        errorEl.classList.remove('hidden');
                        return;
                    }
                    const result = parseYamlAndImport(yamlText);
                    if (!result.success) {
                        errorEl.textContent = result.error;
                        errorEl.classList.remove('hidden');
                    } else {
                        summaryEl.textContent = `✅ ${result.importedCount}개 항목을 가져왔습니다. 각 스텝을 확인하세요.`;
                        summaryEl.classList.remove('hidden');
                        setTimeout(() => {
                            closeImportModal();
                            renderStepBar();
                            renderStepContent();
                            updateYamlPreview();
                            showToast(`hosts.yml 가져오기 완료: ${result.importedCount}개 항목`);
                        }, 1000);
                    }
                }
            });

            // Cancel / close
            document.getElementById('importCancel').addEventListener('click', closeImportModal);
            document.getElementById('importClose').addEventListener('click', closeImportModal);
            document.getElementById('importModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeImportModal();
            });

            // Open trigger
            document.getElementById('importYaml').addEventListener('click', openImportModal);
        }

        function updateYamlPreview() {
            const yaml = generateYaml();
            const preview = document.getElementById('yamlPreview');

            const highlighted = yaml
                .split('\n')
                .map(line => {
                    if (line.startsWith('#')) {
                        return `<span class="yaml-comment">${escapeHtml(line)}</span>`;
                    }
                    const match = line.match(/^(\s*)([a-zA-Z_][a-zA-Z0-9_]*):\s*(.*)$/);
                    if (match) {
                        const [_, indent, key, value] = match;
                        let valueHtml = value;
                        if (value.startsWith('"') && value.endsWith('"')) {
                            valueHtml = `<span class="yaml-string">${escapeHtml(value)}</span>`;
                        } else if (value === 'true' || value === 'false' || /^\d+$/.test(value)) {
                            valueHtml = `<span class="yaml-value">${escapeHtml(value)}</span>`;
                        } else if (value) {
                            valueHtml = `<span class="yaml-value">${escapeHtml(value)}</span>`;
                        }
                        return `${indent}<span class="yaml-key">${key}</span>: ${valueHtml}`;
                    }
                    return escapeHtml(line);
                })
                .join('\n');

            preview.innerHTML = highlighted;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // VALIDATION
        // ============================================================
        function validateConfig() {
            const errors = [], warnings = [];
            if (!state.data.ansible_user) errors.push('[Step 1] ansible_user가 비어 있습니다.');
            if (state.data.installation_method === 'archive') {
                if (!state.data.confluent_archive_file_source) errors.push('[Step 2] confluent_archive_file_source 경로가 필요합니다.');
                if (!state.data.archive_owner) errors.push('[Step 2] archive_owner가 필요합니다.');
                if (!state.data.archive_group) errors.push('[Step 2] archive_group이 필요합니다.');
            }
            if (!state.data.install_java && !state.data.custom_java_path && !state.data.java_home)
                warnings.push('[Step 2/13] install_java=false이나 custom_java_path/JAVA_HOME이 없습니다.');
            if (!state.data.hosts.kafka_controller || state.data.hosts.kafka_controller.length === 0)
                errors.push('[Step 3] Kafka Controller 호스트가 1개 이상 필요합니다.');
            if (!state.data.hosts.kafka_broker || state.data.hosts.kafka_broker.length === 0)
                errors.push('[Step 3] Kafka Broker 호스트가 1개 이상 필요합니다.');
            (state.data.hosts.kafka_controller || []).forEach((h, i) => {
                if (!h.hostname) errors.push(`[Step 3] Controller #${i+1}: Hostname 비어 있음`);
                if (!h.ansible_host) warnings.push(`[Step 3] Controller #${i+1}: ansible_host(IP) 비어 있음`);
            });
            (state.data.hosts.kafka_broker || []).forEach((h, i) => {
                if (!h.hostname) errors.push(`[Step 3] Broker #${i+1}: Hostname 비어 있음`);
            });
            const ctrlCnt = (state.data.hosts.kafka_controller || []).length;
            if (ctrlCnt > 0 && ctrlCnt % 2 === 0)
                warnings.push(`[Step 3] Controller ${ctrlCnt}개 — 쿼럼은 홀수(1,3,5...)를 권장합니다.`);
            // --- Step 4: OS 사용자/그룹 ---
            if (!state.data.common_user_group) {
                // 커스텀 사용자/그룹 모드일 때만 필수
                if (!state.data.common_user) errors.push('[Step 4] common_user가 비어 있습니다.');
                if (!state.data.common_group) errors.push('[Step 4] common_group이 비어 있습니다.');
            }

            // --- Step 5: SSL ---
            if (state.data.listener_protocol === 'PLAINTEXT')
                warnings.push('[Step 5] PLAINTEXT는 프로덕션에 부적합합니다. SASL_SSL을 권장합니다.');
            if (state.data.ssl_method === 'provided-keystore') {
                if (!state.data.ssl_keystore_path) errors.push('[Step 5] SSL Keystore 경로(ssl_keystore_path)가 비어 있습니다.');
                if (!state.data.ssl_keystore_password) errors.push('[Step 5] SSL Keystore 비밀번호(ssl_keystore_password)가 비어 있습니다.');
                if (!state.data.ssl_truststore_path) errors.push('[Step 5] SSL Truststore 경로(ssl_truststore_path)가 비어 있습니다.');
                if (!state.data.ssl_truststore_password) errors.push('[Step 5] SSL Truststore 비밀번호(ssl_truststore_password)가 비어 있습니다.');
            }
            if (state.data.ssl_method === 'custom-certs') {
                if (!state.data.ssl_ca_cert_path) errors.push('[Step 5] CA 인증서 경로(ssl_ca_cert_path)가 비어 있습니다.');
                if (!state.data.ssl_signed_cert_path) errors.push('[Step 5] 서명된 인증서 경로(ssl_signed_cert_path)가 비어 있습니다.');
                if (!state.data.ssl_key_path) errors.push('[Step 5] 개인키 경로(ssl_key_path)가 비어 있습니다.');
            }

            // --- Step 6: SASL 사용자 ---
            if (state.data.sasl_mechanism === 'plain') {
                const plainUsers = Object.keys(state.data.sasl_plain_users || {});
                if (plainUsers.length === 0)
                    warnings.push('[Step 6] SASL PLAIN 선택 시 sasl_plain_users에 최소 1명의 사용자가 필요합니다.');
            }
            if (state.data.sasl_mechanism === 'scram-sha-256' || state.data.sasl_mechanism === 'scram-sha-512') {
                const scramUsers = Object.keys(state.data.sasl_scram_users || {});
                if (scramUsers.length === 0)
                    warnings.push('[Step 6] SASL SCRAM 선택 시 sasl_scram_users에 최소 1명의 사용자가 필요합니다.');
            }
            if (state.data.sasl_mechanism === 'kerberos') {
                if (!state.data.kerberos_realm) errors.push('[Step 6] Kerberos Realm이 비어 있습니다.');
                if (!state.data.kerberos_kdc_hostname) errors.push('[Step 6] Kerberos KDC 호스트명이 비어 있습니다.');
            }
            if (state.data.sasl_mechanism === 'oauth') {
                if (!state.data.oauth_token_uri) errors.push('[Step 6] OAuth Token URI가 비어 있습니다.');
                if (!state.data.oauth_jwks_uri) errors.push('[Step 6] OAuth JWKS URI가 비어 있습니다.');
            }

            // --- Step 7: RBAC / MDS ---
            if (state.data.authorization_type === 'rbac') {
                if (!state.data.mds_super_user) errors.push('[Step 7] mds_super_user가 비어 있습니다.');
                if (!state.data.mds_super_user_password) warnings.push('[Step 7] mds_super_user_password가 비어 있습니다.');
                // create_mds_certs=false인 경우 PEM 파일 경로 필수
                if (!state.data.create_mds_certs) {
                    if (!state.data.ssl_ca_cert_path && state.data.ssl_method !== 'provided-keystore')
                        warnings.push('[Step 7] create_mds_certs=false 이면 MDS용 CA 인증서 경로(ssl_ca_cert_path)를 확인하세요.');
                }
                // LDAP 연동 시 MDS LDAP 자격증명 필요
                if (state.data.ldap_enabled && state.data.sasl_mechanism !== 'oauth') {
                    if (!state.data.mds_ldap_user) errors.push('[Step 7] LDAP 연동 RBAC에서 mds_ldap_user가 비어 있습니다.');
                    if (!state.data.mds_ldap_password) errors.push('[Step 7] LDAP 연동 RBAC에서 mds_ldap_password가 비어 있습니다.');
                }
                // OAuth(OAUTHBEARER) 선택 시에는 LDAP 없이도 MDS/RBAC 운영 가능
                // 그 외(PLAIN, SCRAM, Kerberos)는 LDAP이 사실상 필수
                if (!state.data.ldap_enabled && state.data.sasl_mechanism !== 'oauth') {
                    errors.push('[Step 7] RBAC 활성화 시 LDAP 연동이 필요합니다 (Step 8). OAuth 사용 시에는 예외.');
                }
            }

            // --- Step 8: LDAP ---
            if (state.data.ldap_enabled) {
                if (!state.data.ldap_url) errors.push('[Step 8] LDAP URL이 비어 있습니다.');
                if (!state.data.ldap_base_dn) errors.push('[Step 8] LDAP Base DN이 비어 있습니다.');
                if (!state.data.ldap_bind_dn) errors.push('[Step 8] LDAP Bind DN(ldap_bind_dn)이 비어 있습니다.');
                if (!state.data.ldap_bind_password) errors.push('[Step 8] LDAP Bind 비밀번호(ldap_bind_password)가 비어 있습니다.');
                if (!state.data.ldap_user_search_base) warnings.push('[Step 8] ldap_user_search_base가 비어 있습니다.');
            }

            // --- Step 9: OIDC ---
            if (state.data.control_center_oidc_enabled) {
                if (!state.data.oidc_client_id) errors.push('[Step 9] OIDC Client ID 비어 있음');
                if (!state.data.oidc_client_secret) errors.push('[Step 9] OIDC Client Secret 비어 있음');
                if (!state.data.oidc_issuer) errors.push('[Step 9] OIDC Issuer URL 비어 있음');
                if (!state.data.oidc_jwks_uri) errors.push('[Step 9] OIDC JWKS URI 비어 있음');
            }

            // --- Step 11: Schema Registry ---
            if ((state.data.hosts.schema_registry || []).length > 0 && state.data.authorization_type === 'rbac') {
                if (!state.data.sr_service_user) errors.push('[Step 11] RBAC 활성화 시 sr_service_user가 필요합니다.');
                if (!state.data.sr_service_password) errors.push('[Step 11] RBAC 활성화 시 sr_service_password가 필요합니다.');
            }

            // --- Step 12: Control Center ---
            if ((state.data.hosts.control_center_next_gen || []).length > 0 && state.data.authorization_type === 'rbac') {
                if (!state.data.c3_service_user) errors.push('[Step 12] RBAC 활성화 시 c3_service_user가 필요합니다.');
                if (!state.data.c3_service_password) errors.push('[Step 12] RBAC 활성화 시 c3_service_password가 필요합니다.');
            }

            // --- Step 13: JMX Exporter ---
            const jmxEnabled = state.data.kafka_broker_jmxexporter_enabled || state.data.kafka_controller_jmxexporter_enabled;
            if (jmxEnabled) {
                if (!state.data.jmxexporter_jar_url) warnings.push('[Step 13] JMX Exporter 활성화 시 jmxexporter_jar_url이 필요합니다.');
                if (!state.data.jmxexporter_jar_path) warnings.push('[Step 13] JMX Exporter 활성화 시 jmxexporter_jar_path가 필요합니다.');
            }

            return { errors, warnings };
        }

        // ============================================================
        // VALIDATION UI
        // ============================================================
        function showValidationResult() {
            const { errors, warnings } = validateConfig();
            const existing = document.getElementById('validationPanel');
            if (existing) existing.remove();

            if (errors.length === 0 && warnings.length === 0) {
                showToast('✅ 검증 통과 — 문제 없음');
                return;
            }

            const panel = document.createElement('div');
            panel.id = 'validationPanel';
            panel.style.cssText = 'position:fixed;bottom:4rem;right:1rem;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.4);font-size:.85rem;max-height:60vh;overflow-y:auto;';

            const close = document.createElement('button');
            close.textContent = '✕';
            close.style.cssText = 'float:right;background:none;border:none;color:var(--text);cursor:pointer;font-size:1rem;';
            close.onclick = () => panel.remove();
            panel.appendChild(close);

            if (errors.length > 0) {
                const h = document.createElement('div');
                h.style.cssText = 'color:var(--negative);font-weight:600;margin-bottom:.5rem;';
                h.textContent = `❌ 오류 (${errors.length})`;
                panel.appendChild(h);
                errors.forEach(e => {
                    const d = document.createElement('div');
                    d.style.cssText = 'margin:.25rem 0;padding:.25rem .5rem;background:rgba(229,115,115,.1);border-radius:4px;';
                    d.textContent = e;
                    panel.appendChild(d);
                });
            }
            if (warnings.length > 0) {
                const h = document.createElement('div');
                h.style.cssText = 'color:var(--warning);font-weight:600;margin:.75rem 0 .5rem;';
                h.textContent = `⚠️ 경고 (${warnings.length})`;
                panel.appendChild(h);
                warnings.forEach(w => {
                    const d = document.createElement('div');
                    d.style.cssText = 'margin:.25rem 0;padding:.25rem .5rem;background:rgba(255,183,77,.1);border-radius:4px;';
                    d.textContent = w;
                    panel.appendChild(d);
                });
            }
            document.body.appendChild(panel);
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        document.getElementById('copyYaml').addEventListener('click', () => {
            navigator.clipboard.writeText(generateYaml()).then(() => showToast('YAML이 복사되었습니다!'));
        });
        document.getElementById('copyYamlBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(generateYaml()).then(() => showToast('YAML이 복사되었습니다!'));
        });

        document.getElementById('downloadYaml').addEventListener('click', () => {
            const yaml = generateYaml();
            const blob = new Blob([yaml], { type: 'text/yaml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'hosts.yml';
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('hosts.yml 다운로드 완료!');
        });
        document.getElementById('downloadYamlBtn').addEventListener('click', () => {
            const yaml = generateYaml();
            const blob = new Blob([yaml], { type: 'text/yaml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'hosts.yml';
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('hosts.yml 다운로드 완료!');
        });

        document.getElementById('exportPng').addEventListener('click', () => {
            const panel = document.querySelector('.right-panel');
            if (typeof html2canvas === 'undefined') { showToast('html2canvas 라이브러리 로드 실패'); return; }
            html2canvas(panel, { backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0f1419' }).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/png');
                a.download = 'hosts-yaml-preview.png';
                a.click();
                showToast('PNG 내보내기 완료!');
            });
        });

        document.getElementById('resetAll').addEventListener('click', () => {
            if (!confirm('모든 설정을 초기화하시겠습니까?')) return;
            location.reload();
        });

        // ============================================================
        // INITIALIZATION
        // ============================================================
        loadTheme();
        renderStepBar();
        renderStepContent();
        updateYamlPreview();
        initImportModal();

    </script>
</body>
</html>
