<!DOCTYPE html>
<html lang="ko" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP-Ansible hosts.yml Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a1f2e;
            --surface-hover: #252d3d;
            --border: #3a4556;
            --text: #e8eaed;
            --text-secondary: #9ca3af;
            --accent: #5b9ff5;
            --accent-secondary: #7fb3f5;
            --positive: #81c784;
            --negative: #e57373;
            --warning: #ffb74d;
            --info: #64b5f6;
        }

        html.theme-light {
            --bg: #ffffff;
            --surface: #f5f7fa;
            --surface-hover: #e8eef8;
            --border: #cbd5e1;
            --text: #1a202c;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-secondary: #60a5fa;
            --positive: #10b981;
            --negative: #ef4444;
            --warning: #f59e0b;
            --info: #0ea5e9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        code, pre {
            font-family: 'JetBrains Mono', monospace;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-menu {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .menu-btn {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background: var(--border);
        }

        .theme-toggle {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.25rem;
            transition: background 0.2s;
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .step-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            overflow-x: auto;
            display: flex;
            gap: 0.5rem;
            z-index: 50;
        }

        .step-dot {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .step-dot.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .step-dot.done {
            background: var(--positive);
            color: white;
            border-color: var(--positive);
        }

        .step-dot.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            color: var(--text-secondary);
        }

        .step-dot-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.5rem;
            height: 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            padding: 2rem;
        }

        .right-panel {
            width: 500px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .step-desc {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .form-section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .form-label.required::after {
            content: " *";
            color: var(--negative);
        }

        .form-help {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .text-input, .number-input, .select-input, .textarea-input {
            width: 100%;
            padding: 0.75rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        .text-input:focus, .number-input:focus, .select-input:focus, .textarea-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(91, 159, 245, 0.1);
        }

        .textarea-input {
            min-height: 100px;
            resize: vertical;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle-switch {
            position: relative;
            display: inline-flex;
            width: 2.5rem;
            height: 1.5rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-switch.active {
            background: var(--positive);
            border-color: var(--positive);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 1.25rem;
            height: 1.25rem;
            background: white;
            border-radius: 50%;
            top: 0.125rem;
            left: 0.125rem;
            transition: left 0.2s;
        }

        .toggle-switch.active::after {
            left: 1.125rem;
        }

        .radio-card-group, .checkbox-card-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .option-card {
            background: var(--surface-hover);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .option-card:hover {
            border-color: var(--accent);
            background: var(--surface);
        }

        .option-card.active {
            border-color: var(--accent);
            background: rgba(91, 159, 245, 0.1);
        }

        .option-radio, .option-check {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid var(--border);
            background: var(--surface-hover);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .option-radio {
            border-radius: 50%;
        }

        .option-card.active .option-radio,
        .option-card.active .option-check {
            border-color: var(--accent);
            background: var(--accent);
        }

        .option-radio::after {
            content: '';
            width: 0.5rem;
            height: 0.5rem;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .option-card.active .option-radio::after {
            opacity: 1;
        }

        .option-check::after {
            content: '✓';
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .option-card.active .option-check::after {
            opacity: 1;
        }

        .option-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            padding-right: 2rem;
        }

        .option-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .option-tag {
            display: inline-block;
            font-size: 0.65rem;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        .tag-recommended {
            background: rgba(129, 199, 132, 0.2);
            color: var(--positive);
        }

        .tag-not-recommended {
            background: rgba(229, 115, 115, 0.2);
            color: var(--negative);
        }

        .tag-advanced {
            background: rgba(91, 159, 245, 0.2);
            color: var(--accent);
        }

        .tag-enterprise {
            background: rgba(171, 71, 188, 0.2);
            color: #ba68c8;
        }

        .dep-notice {
            background: rgba(255, 179, 71, 0.1);
            border-left: 3px solid var(--warning);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--text);
        }

        .dep-notice::before {
            content: '⚠ ';
            font-weight: 600;
        }

        .dynamic-list {
            margin-bottom: 1rem;
        }

        .list-item {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            position: relative;
        }

        .list-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .list-item-title {
            font-weight: 500;
        }

        .list-item-remove {
            background: var(--negative);
            color: white;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.2s;
        }

        .list-item-remove:hover {
            background: #ef4444;
        }

        .add-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .add-button:hover {
            background: var(--accent-secondary);
        }

        .add-button::before {
            content: '+';
            font-weight: 700;
        }

        .kv-editor {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
        }

        .kv-pair {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            align-items: end;
        }

        .kv-pair:last-child {
            margin-bottom: 0;
        }

        .kv-remove {
            background: var(--negative);
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.2s;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .kv-remove:hover {
            background: #ef4444;
        }

        .yaml-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .yaml-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .yaml-card {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-y: auto;
            flex: 1;
            margin-bottom: 1rem;
        }

        .yaml-content {
            font-size: 0.75rem;
            line-height: 1.6;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
        }

        .yaml-comment {
            color: var(--text-secondary);
        }

        .yaml-key {
            color: var(--info);
        }

        .yaml-value {
            color: var(--positive);
        }

        .yaml-string {
            color: var(--accent);
        }

        .yaml-controls {
            display: flex;
            gap: 0.5rem;
        }

        .yaml-btn {
            flex: 1;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .yaml-btn:hover {
            background: var(--accent-secondary);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--positive);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 6px;
            font-size: 0.875rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }

        .host-input-group {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .host-input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .host-input-grid.full {
            grid-template-columns: 1fr;
        }

        @media (max-width: 960px) {
            .right-panel {
                display: none;
            }

            .radio-card-group, .checkbox-card-group {
                grid-template-columns: 1fr;
            }
        }

        .hidden {
            display: none !important;
        }

        .footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── Import Modal ── */
        .import-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .import-modal.hidden { display: none; }
        .import-modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 90%;
            max-width: 520px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .import-modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .import-modal-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 0;
        }
        .import-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }
        .import-close:hover { color: var(--text); }
        .import-modal-body { padding: 1.5rem; }
        .import-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .import-tab {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .import-tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .import-tab-content { display: none; }
        .import-tab-content.active { display: block; }
        .import-file-input-wrap {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .import-file-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface-hover);
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            justify-content: center;
            color: var(--text-secondary);
            transition: border-color 0.2s;
        }
        .import-file-label:hover { border-color: var(--accent); color: var(--accent); }
        .import-file-label input[type="file"] { display: none; }
        .import-file-name {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }
        .import-paste-area {
            width: 100%;
            min-height: 200px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            resize: vertical;
            outline: none;
        }
        .import-paste-area:focus { border-color: var(--accent); }
        .import-error {
            background: rgba(229,115,115,0.1);
            border-left: 3px solid var(--negative);
            padding: 0.75rem 1rem;
            border-radius: 4px;
            color: var(--negative);
            font-size: 0.8rem;
            margin-top: 1rem;
            white-space: pre-wrap;
        }
        .import-error.hidden { display: none; }
        .import-modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }
        .import-summary {
            background: rgba(129,199,132,0.1);
            border-left: 3px solid var(--positive);
            padding: 0.75rem 1rem;
            border-radius: 4px;
            color: var(--positive);
            font-size: 0.8rem;
            margin-top: 1rem;
        }
        .import-summary.hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">CP-Ansible hosts.yml Generator</div>
            <div class="header-menu">
                <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>
                <button class="menu-btn" id="exportPng">PNG 내보내기</button>
                <button class="menu-btn" id="importYaml">📥 YAML 가져오기</button>
                <button class="menu-btn" id="downloadYaml">YAML 다운로드</button>
                <button class="menu-btn" id="copyYaml">YAML 복사</button>
                <button class="menu-btn" id="resetAll">초기화</button>
            </div>
        </div>

        <div class="step-bar" id="stepBar"></div>

        <div class="main">
            <div class="left-panel" id="leftPanel"></div>
            <div class="right-panel">
                <div class="yaml-title">YAML 미리보기</div>
                <div class="yaml-card">
                    <div class="yaml-content" id="yamlPreview"></div>
                </div>
                <div class="yaml-controls">
                    <button class="yaml-btn" id="copyYamlBtn">복사</button>
                    <button class="yaml-btn" id="downloadYamlBtn">다운로드</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <span>Confluent Platform 8.x KRaft / cp-ansible 기반</span>
            <span id="footerStatus"></span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Import YAML Modal -->
    <div class="import-modal hidden" id="importModal">
        <div class="import-modal-content">
            <div class="import-modal-header">
                <h2>hosts.yml 가져오기</h2>
                <button class="import-close" id="importClose">&times;</button>
            </div>
            <div class="import-modal-body">
                <div class="import-tabs">
                    <button class="import-tab active" data-tab="file">📁 파일 업로드</button>
                    <button class="import-tab" data-tab="paste">📋 텍스트 붙여넣기</button>
                </div>
                <div class="import-tab-content active" id="importFileTab">
                    <div class="import-file-input-wrap">
                        <label class="import-file-label">
                            <input type="file" id="yamlFileInput" accept=".yml,.yaml,.txt">
                            📂 hosts.yml 파일 선택 또는 여기로 끌어다 놓기
                        </label>
                        <div class="import-file-name" id="importFileName">선택된 파일 없음</div>
                    </div>
                </div>
                <div class="import-tab-content" id="importPasteTab">
                    <textarea class="import-paste-area" id="yamlPasteInput" placeholder="---&#10;all:&#10;  vars:&#10;    ansible_user: ...&#10;  children:&#10;    kafka_broker:&#10;      hosts: ..."></textarea>
                </div>
                <div class="import-error hidden" id="importError"></div>
                <div class="import-summary hidden" id="importSummary"></div>
            </div>
            <div class="import-modal-footer">
                <button class="menu-btn" id="importCancel">취소</button>
                <button class="add-button" id="importSubmit">가져오기</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // STATE MANAGEMENT
        // ============================================================
        const state = {
            currentStep: 1,
            completedSteps: new Set(),
            data: {
                ansible_connection: 'ssh',
                ansible_user: '',
                ansible_port: 22,
                ansible_become: true,
                ansible_python_interpreter: '',
                deployment_strategy: 'rolling',
                ansible_strategy: 'linear',

        // ============================================================
        // UTILITY FUNCTIONS
        // ============================================================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('theme-dark')) {
                html.classList.remove('theme-dark');
                html.classList.add('theme-light');
                document.getElementById('themeToggle').textContent = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.remove('theme-light');
                html.classList.add('theme-dark');
                document.getElementById('themeToggle').textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            const html = document.documentElement;
            if (theme === 'light') {
                html.classList.add('theme-light');
                html.classList.remove('theme-dark');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        }

        // ============================================================
        // STEP RENDERING
        // ============================================================
        function renderStepBar() {
            const stepBar = document.getElementById('stepBar');
            stepBar.innerHTML = '';

            steps.forEach(step => {
                const dot = document.createElement('button');
                dot.className = 'step-dot';

                if (state.currentStep === step.id) {
                    dot.classList.add('active');
                } else if (state.completedSteps.has(step.id)) {
                    dot.classList.add('done');
                }

                const number = document.createElement('div');
                number.className = 'step-dot-number';
                number.textContent = step.id;

                const label = document.createElement('span');
                label.textContent = step.title;

                dot.appendChild(number);
                dot.appendChild(label);

                // 모든 14단계를 클릭 가능하게 함
                dot.addEventListener('click', () => switchStep(step.id));

                stepBar.appendChild(dot);
            });
        }

        function switchStep(stepId) {
            state.completedSteps.add(state.currentStep);
            state.currentStep = stepId;
            renderStepBar();
            renderStepContent();
            updateYamlPreview();
        }

        function renderStepContent() {
            const leftPanel = document.getElementById('leftPanel');
            leftPanel.innerHTML = '';

            const step = steps[state.currentStep - 1];
            if (!step) return;

            const content = document.createElement('div');
            content.className = 'step-content active';

            const title = document.createElement('h2');
            title.className = 'step-title';
            title.textContent = step.title;

            const desc = document.createElement('p');
            desc.className = 'step-desc';
            desc.textContent = step.desc;

            content.appendChild(title);
            content.appendChild(desc);

            const form = renderStepForm(state.currentStep);
            content.appendChild(form);

            leftPanel.appendChild(content);
        }

        function renderStepForm(stepId) {
            const form = document.createElement('form');

            switch(stepId) {
                case 1: return renderStep1(form);
                case 2: return renderStep2(form);
                case 3: return renderStep3(form);
                case 4: return renderStep4(form);
                case 5: return renderStep5(form);
                case 6: return renderStep6(form);
                case 7: return renderStep7(form);
                case 8: return renderStep8(form);
                case 9: return renderStep9(form);
                case 10: return renderStep10(form);
                case 11: return renderStep11(form);
                case 12: return renderStep12(form);
                case 13: return renderStep13(form);
                case 14: return renderStep14(form);
                default: return form;
            }
        }

        function renderHostList(component, label) {
            const container = document.createElement('div');
            const hosts = state.data.hosts[component] || [];

            hosts.forEach((host, idx) => {
                const item = document.createElement('div');
                item.className = 'host-input-group';

                let html = `
                    <div class="list-item-header">
                        <span class="list-item-title">${label} #${idx + 1}</span>
                        <button type="button" class="list-item-remove" data-component="${component}" data-index="${idx}">
                            삭제
                        </button>
                    </div>
                    <div class="host-input-grid">
                        <div class="form-group">
                            <label class="form-label">Hostname</label>
                            <input type="text" class="text-input" value="${host.hostname || ''}"
                                   data-component="${component}" data-index="${idx}" data-field="hostname" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">IP (ansible_host)</label>
                            <input type="text" class="text-input" value="${host.ansible_host || ''}"
                                   data-component="${component}" data-index="${idx}" data-field="ansible_host" required>
                        </div>
                `;

                if (component === 'kafka_controller') {
                    html += `
                        <div class="form-group full">
                            <label class="form-label">node_id</label>
                            <input type="number" class="number-input" value="${host.node_id || 9991}"
                                   data-component="${component}" data-index="${idx}" data-field="node_id">
                        </div>
                    `;
                } else if (component === 'kafka_broker') {
                    html += `
                        <div class="form-group full">
                            <label class="form-label">broker_id</label>
                            <input type="number" class="number-input" value="${host.broker_id || idx + 1}"
                                   data-component="${component}" data-index="${idx}" data-field="broker_id">
                        </div>
                    `;
                }

                html += `</div>`;
                item.innerHTML = html;
                container.appendChild(item);
            });

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'add-button';
            addBtn.textContent = `${label} 호스트 추가`;
            addBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!state.data.hosts[component]) {
                    state.data.hosts[component] = [];
                }

                let newHost = {
                    hostname: '',
                    ansible_host: '',
                };

                if (component === 'kafka_controller') {
                    newHost.node_id = 9991 + state.data.hosts[component].length;
                    newHost.node_ip = '';
                } else if (component === 'kafka_broker') {
                    newHost.broker_id = state.data.hosts[component].length + 1;
                    newHost.broker_ip = '';
                }

                state.data.hosts[component].push(newHost);
                renderStepContent();
                updateYamlPreview();
            });
            container.appendChild(addBtn);

            container.addEventListener('change', (e) => {
                if (e.target.dataset.component && e.target.dataset.field) {
                    const comp = e.target.dataset.component;
                    const idx = parseInt(e.target.dataset.index);
                    const field = e.target.dataset.field;
                    state.data.hosts[comp][idx][field] = e.target.type === 'number' ?
                        parseInt(e.target.value) : e.target.value;
                    updateYamlPreview();
                }
            });

            container.addEventListener('click', (e) => {
                if (e.target.classList.contains('list-item-remove')) {
                    e.preventDefault();
                    const comp = e.target.dataset.component;
                    const idx = parseInt(e.target.dataset.index);
                    state.data.hosts[comp].splice(idx, 1);
                    renderStepContent();
                    updateYamlPreview();
                }
            });

            return container;
        }

                const section8g = document.createElement('div');
                section8g.style.marginBottom = '2rem';
                const title = document.createElement('div');
                title.style.fontWeight = '600';
                title.style.marginBottom = '0.75rem';
                title.textContent = 'Control Center 파일 복사';
                section8g.appendChild(title);
                section8g.appendChild(renderKeyValueEditor('control_center_next_gen_copy_files', '소스 경로', '대상 경로'));
                section8.appendChild(section8g);
            }

            form.appendChild(section8);

            // === Health Checks ===
            const section9 = createFormSection('Health Checks', [
                { type: 'toggle', label: 'Health Checks 활성화', key: 'health_checks_enabled' },
            ]);
            form.appendChild(section9);

            return form;
        }

        // ============================================================
        // FORM HELPERS
        // ============================================================
        function createFormSection(title, fields) {
            const section = document.createElement('div');
            section.className = 'form-section';

            if (title) {
                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'form-section-title';
                sectionTitle.textContent = title;
                section.appendChild(sectionTitle);
            }

            fields.forEach(field => {
                if (field.visible && !field.visible()) {
                    return;
                }

                const group = document.createElement('div');
                group.className = 'form-group';

                switch(field.type) {
                    case 'text':
                    case 'number':
                        const label = document.createElement('label');
                        label.className = 'form-label' + (field.required ? ' required' : '');
                        label.textContent = field.label;
                        group.appendChild(label);

                        const input = document.createElement('input');
                        input.type = field.inputType || field.type;
                        input.className = field.type === 'number' ? 'number-input' : 'text-input';
                        input.value = state.data[field.key] || field.default || '';
                        input.required = field.required || false;
                        input.addEventListener('change', (e) => {
                            state.data[field.key] = field.type === 'number' ?
                                parseInt(e.target.value) : e.target.value;
                            updateYamlPreview();
                        });
                        group.appendChild(input);

                        if (field.help) {
                            const help = document.createElement('div');
                            help.className = 'form-help';
                            help.textContent = field.help;
                            group.appendChild(help);
                        }
                        break;

                    case 'select':
                        const selectLabel = document.createElement('label');
                        selectLabel.className = 'form-label';
                        selectLabel.textContent = field.label;
                        group.appendChild(selectLabel);

                        const select = document.createElement('select');
                        select.className = 'select-input';
                        field.options.forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt.value;
                            option.textContent = opt.label;
                            select.appendChild(option);
                        });
                        // select.value must be set AFTER options are appended to take effect
                        select.value = state.data[field.key] || '';
                        select.addEventListener('change', (e) => {
                            state.data[field.key] = e.target.value;
                            renderStepContent();
                            updateYamlPreview();
                        });
                        group.appendChild(select);
                        break;

                    case 'toggle':
                        const toggleLabel = document.createElement('label');
                        toggleLabel.className = 'form-label';
                        toggleLabel.style.display = 'flex';
                        toggleLabel.style.alignItems = 'center';
                        toggleLabel.style.gap = '0.5rem';

                        const toggle = document.createElement('div');
                        toggle.className = 'toggle-switch' + (state.data[field.key] ? ' active' : '');
                        toggle.addEventListener('click', () => {
                            state.data[field.key] = !state.data[field.key];
                            toggle.classList.toggle('active');
                            renderStepContent();
                            updateYamlPreview();
                        });

                        toggleLabel.appendChild(toggle);
                        toggleLabel.appendChild(document.createTextNode(field.label));
                        group.appendChild(toggleLabel);

                        if (field.help) {
                            const help = document.createElement('div');
                            help.className = 'form-help';
                            help.style.marginTop = '0.5rem';
                            help.textContent = field.help;
                            group.appendChild(help);
                        }
                        break;

                    case 'radio':
                        const radioLabel = document.createElement('label');
                        radioLabel.className = 'form-label';
                        radioLabel.textContent = field.label;
                        group.appendChild(radioLabel);

                        const radioContainer = document.createElement('div');
                        radioContainer.className = 'radio-card-group';
                        field.options.forEach(opt => {
                            if (opt.disabled) return;

                            const card = document.createElement('div');
                            card.className = 'option-card' + (state.data[field.key] === opt.value ? ' active' : '');

                            const radio = document.createElement('div');
                            radio.className = 'option-radio';
                            card.appendChild(radio);

                            const title = document.createElement('div');
                            title.className = 'option-title';
                            title.textContent = opt.label;
                            card.appendChild(title);

                            if (opt.desc) {
                                const desc = document.createElement('div');
                                desc.className = 'option-desc';
                                desc.textContent = opt.desc;
                                card.appendChild(desc);
                            }

                            if (opt.tag) {
                                const tag = document.createElement('div');
                                tag.className = 'option-tag ' + opt.tag.class;
                                tag.textContent = opt.tag.text;
                                card.appendChild(tag);
                            }

                            card.addEventListener('click', () => {
                                state.data[field.key] = opt.value;
                                renderStepContent();
                                updateYamlPreview();
                            });

                            radioContainer.appendChild(card);
                        });
                        group.appendChild(radioContainer);
                        break;

                    case 'checkbox':
                        const checkboxLabel = document.createElement('label');
                        checkboxLabel.className = 'form-label';
                        checkboxLabel.textContent = field.label;
                        group.appendChild(checkboxLabel);

                        const checkboxContainer = document.createElement('div');
                        checkboxContainer.className = 'checkbox-card-group';
                        field.options.forEach(opt => {
                            const card = document.createElement('div');
                            card.className = 'option-card' + (state.data[field.key][opt.value] ? ' active' : '') +
                                           (opt.disabled ? ' disabled' : '');

                            if (opt.disabled) {
                                card.style.cursor = 'not-allowed';
                                card.style.opacity = '0.6';
                            }

                            const checkbox = document.createElement('div');
                            checkbox.className = 'option-check';
                            card.appendChild(checkbox);

                            const title = document.createElement('div');
                            title.className = 'option-title';
                            title.textContent = opt.label;
                            card.appendChild(title);

                            if (opt.help) {
                                const help = document.createElement('div');
                                help.className = 'option-desc';
                                help.textContent = opt.help;
                                card.appendChild(help);
                            }

                            if (!opt.disabled) {
                                card.addEventListener('click', () => {
                                    state.data[field.key][opt.value] = !state.data[field.key][opt.value];
                                    renderStepContent();
                                    updateYamlPreview();
                                });
                            }

                            checkboxContainer.appendChild(card);
                        });
                        group.appendChild(checkboxContainer);
                        break;

                    case 'textarea':
                        const textareaLabel = document.createElement('label');
                        textareaLabel.className = 'form-label';
                        textareaLabel.textContent = field.label;
                        group.appendChild(textareaLabel);

                        const textarea = document.createElement('textarea');
                        textarea.className = 'textarea-input';
                        textarea.value = state.data[field.key] || '';
                        textarea.addEventListener('change', (e) => {
                            state.data[field.key] = e.target.value;
                            updateYamlPreview();
                        });
                        group.appendChild(textarea);

                        if (field.help) {
                            const help = document.createElement('div');
                            help.className = 'form-help';
                            help.textContent = field.help;
                            group.appendChild(help);
                        }
                        break;
                }

                section.appendChild(group);
            });

            return section;
        }

        function renderKeyValueEditor(key, keyLabel, valueLabel) {
            const container = document.createElement('div');
            container.className = 'kv-editor';

            const data = state.data[key] || {};
            const entries = Array.isArray(data) ? data : Object.entries(data).map(([k, v]) => ({ key: k, value: v }));

            entries.forEach((entry, idx) => {
                const pair = document.createElement('div');
                pair.className = 'kv-pair';

                const keyInput = document.createElement('input');
                keyInput.type = 'text';
                keyInput.className = 'text-input';
                keyInput.placeholder = keyLabel;
                keyInput.value = typeof entry === 'object' && entry.key ? entry.key : entry;

                const valueInput = document.createElement('input');
                valueInput.type = 'text';
                valueInput.className = 'text-input';
                valueInput.placeholder = valueLabel;
                valueInput.value = typeof entry === 'object' && entry.value ? entry.value : '';

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'kv-remove';
                removeBtn.textContent = '✕';
                removeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    entries.splice(idx, 1);
                    updateStateFromKeyValueEditor(key, entries);
                    // Re-render so the removed item disappears from the DOM
                    renderStepContent();
                    updateYamlPreview();
                });

                pair.appendChild(keyInput);
                pair.appendChild(valueInput);
                pair.appendChild(removeBtn);
                container.appendChild(pair);

                [keyInput, valueInput].forEach(input => {
                    input.addEventListener('change', () => {
                        entries[idx] = { key: keyInput.value, value: valueInput.value };
                        updateStateFromKeyValueEditor(key, entries);
                    });
                });
            });

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'add-button';
            addBtn.style.marginTop = '1rem';
            addBtn.textContent = '항목 추가';
            addBtn.addEventListener('click', (e) => {
                e.preventDefault();
                entries.push({ key: '', value: '' });
                renderStepContent();
                updateYamlPreview();
            });
            container.appendChild(addBtn);

            return container;
        }

        function renderKeyValueEditorSimple(key, keyLabel) {
            const container = document.createElement('div');
            container.className = 'kv-editor';

            const data = state.data[key] || [];

            data.forEach((item, idx) => {
                const pair = document.createElement('div');
                pair.className = 'kv-pair';

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'text-input';
                input.placeholder = keyLabel;
                input.value = item;
                input.style.gridColumn = '1 / 3';

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'kv-remove';
                removeBtn.textContent = '✕';
                removeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    state.data[key].splice(idx, 1);
                    renderStepContent();
                    updateYamlPreview();
                });

                pair.appendChild(input);
                pair.appendChild(removeBtn);
                container.appendChild(pair);

                input.addEventListener('change', () => {
                    state.data[key][idx] = input.value;
                    updateYamlPreview();
                });
            });

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'add-button';
            addBtn.style.marginTop = '1rem';
            addBtn.textContent = '항목 추가';
            addBtn.addEventListener('click', (e) => {
                e.preventDefault();
                state.data[key].push('');
                renderStepContent();
                updateYamlPreview();
            });
            container.appendChild(addBtn);

            return container;
        }

        function updateStateFromKeyValueEditor(key, entries) {
            state.data[key] = {};
            entries.forEach(entry => {
                if (entry.key) {
                    state.data[key][entry.key] = entry.value;
                }
            });
            updateYamlPreview();
        }

        // ============================================================
        // YAML SCALAR QUOTING HELPER
        // ============================================================
        // Returns the value serialized for YAML. Wraps in double-quotes when the
        // value contains characters that YAML would misparse without quoting:
        //   - Jinja2 templates  {{ ... }}
        //   - URLs with ://
        //   - Regex-like patterns starting with (?
        //   - Values containing ': ' (mapping separator)
        //   - Values with leading YAML-special chars: # [ ] { } , > | * & ! % @ `
        //   - Semicolon-terminated JAAS config strings
        // If the value is already wrapped in double quotes it is returned as-is.
        function yamlScalar(value) {
            if (value === null || value === undefined) return '';
            const s = String(value);
            if (s === '') return '""';
            // Already double-quoted by the user/code
            if (s.startsWith('"') && s.endsWith('"')) return s;
            // YAML 1.1 boolean/null 예약어: 따옴표 없이 쓰면 boolean/null로 파싱됨
            if (/^(true|false|yes|no|on|off|null|~)$/i.test(s)) {
                return `"${s}"`;
            }
            const needsQuotes =
                s.includes('{{') ||            // Jinja2 template
                s.includes('}}') ||
                s.includes('://') ||           // URL (e.g. ldap://, http://)
                s.includes('(?') ||            // Regex pattern
                s.includes(': ') ||            // Would be parsed as mapping key
                s.endsWith(';') ||             // JAAS config
                /^[#\[\]{},>|*&!%@`]/.test(s); // Leading YAML special chars
            if (needsQuotes) {
                // Escape any existing double-quotes inside the string
                return `"${s.replace(/\\/g, '\\\\').replace(/"/g, '\\"')}"`;
            }
            return s;
        }

        // ============================================================
        // YAML GENERATION
        // ============================================================
        function generateYaml() {
            const lines = [];

            lines.push('---');
            lines.push('# Confluent Platform hosts.yml');
            lines.push('# Generated by CP-Ansible hosts.yml Generator');
            lines.push('');
            lines.push('all:');
            lines.push('  vars:');

            lines.push('    # === Step 1: Basic Environment ===');
            lines.push(`    ansible_connection: ${state.data.ansible_connection}`);
            if (state.data.ansible_user) lines.push(`    ansible_user: ${state.data.ansible_user}`);
            lines.push(`    ansible_port: ${state.data.ansible_port}`);
            lines.push(`    ansible_become: ${state.data.ansible_become ? 'true' : 'false'}`);
            if (state.data.ansible_python_interpreter) {
                lines.push(`    ansible_python_interpreter: ${state.data.ansible_python_interpreter}`);
            }
            lines.push(`    deployment_strategy: ${state.data.deployment_strategy}`);
            if (state.data.ansible_strategy) lines.push(`    ansible_strategy: ${state.data.ansible_strategy}`);
            if (state.data.install_java === false && state.data.custom_java_path) {
                lines.push(`    install_java: false`);
                lines.push(`    custom_java_path: ${state.data.custom_java_path}`);
            } else {
                lines.push(`    install_java: ${state.data.install_java ? 'true' : 'false'}`);
            }
            lines.push('');

            lines.push('    # === Step 2: Installation Method ===');
            lines.push(`    installation_method: ${state.data.installation_method}`);
            lines.push(`    confluent_package_version: "${state.data.confluent_package_version}"`);
            if (state.data.installation_method === 'archive') {
                if (state.data.confluent_archive_file_source) {
                    lines.push(`    confluent_archive_file_source: ${state.data.confluent_archive_file_source}`);
                }
                lines.push(`    confluent_archive_file_remote: ${state.data.confluent_archive_file_remote ? 'true' : 'false'}`);
                if (state.data.archive_destination_path) {
                    lines.push(`    archive_destination_path: ${state.data.archive_destination_path}`);
                }
                if (state.data.archive_owner) {
                    lines.push(`    archive_owner: ${state.data.archive_owner}`);
                }
                if (state.data.archive_group) {
                    lines.push(`    archive_group: ${state.data.archive_group}`);
                }
            }
            if (state.data.repository_configuration === 'custom') {
                if (state.data.custom_yum_repo_path) lines.push(`    custom_yum_repofile_path: ${state.data.custom_yum_repo_path}`);
                if (state.data.custom_apt_repo_path) lines.push(`    custom_apt_repo_filepath: ${state.data.custom_apt_repo_path}`);
            }
            if (state.data.components.control_center_next_gen) {
                lines.push(`    confluent_control_center_next_gen_package_version: "${state.data.confluent_control_center_next_gen_package_version}"`);
                // Archive 설치 시 C3 아카이브 소스 경로
                if (state.data.installation_method === 'archive') {
                    if (state.data.confluent_archive_control_center_next_gen_file_source)
                        lines.push(`    confluent_archive_control_center_next_gen_file_source: ${state.data.confluent_archive_control_center_next_gen_file_source}`);
                    lines.push(`    confluent_archive_control_center_next_gen_file_remote: ${state.data.confluent_archive_control_center_next_gen_file_remote ? 'true' : 'false'}`);
                }
            }
            // confluent_server_enabled: false(커뮤니티 에디션) 시에만 출력 (기본값 true는 생략)
            if (state.data.confluent_server_enabled === false)
                lines.push('    confluent_server_enabled: false');
            lines.push(`    confluent_cli_download_enabled: ${state.data.confluent_cli_download_enabled ? 'true' : 'false'}`);
            // CLI 아카이브 원격 여부: download 비활성화 시 (아카이브 방식) 출력
            if (!state.data.confluent_cli_download_enabled)
                lines.push(`    confluent_cli_archive_file_remote: ${state.data.confluent_cli_archive_file_remote ? 'true' : 'false'}`);
            if (state.data.confluent_cli_path)
                lines.push(`    confluent_cli_path: ${state.data.confluent_cli_path}`);
            lines.push('');

            lines.push('    # === Step 4: Users/Groups/Paths ===');
            if (state.data.common_user_group) {
                if (state.data.common_user) lines.push(`    kafka_controller_user: ${state.data.common_user}`);
                if (state.data.common_group) lines.push(`    kafka_controller_group: ${state.data.common_group}`);
                if (state.data.common_user) lines.push(`    kafka_broker_user: ${state.data.common_user}`);
                if (state.data.common_group) lines.push(`    kafka_broker_group: ${state.data.common_group}`);
                if (state.data.components.schema_registry) {
                    if (state.data.common_user) lines.push(`    schema_registry_user: ${state.data.common_user}`);
                    if (state.data.common_group) lines.push(`    schema_registry_group: ${state.data.common_group}`);
                }
                if (state.data.components.control_center_next_gen) {
                    if (state.data.common_user) lines.push(`    control_center_next_gen_user: ${state.data.common_user}`);
                    if (state.data.common_group) lines.push(`    control_center_next_gen_group: ${state.data.common_group}`);
                }
            } else {
                Object.entries(state.data.component_users).forEach(([key, value]) => {
                    if (value) lines.push(`    ${key}: ${value}`);
                });
            }

            // 브로커 서비스 OS 계정 (kafka_broker_service_user/group) — systemd User= 설정
            if (state.data.kafka_broker_service_user) lines.push(`    kafka_broker_service_user: ${state.data.kafka_broker_service_user}`);
            if (state.data.kafka_broker_service_group) lines.push(`    kafka_broker_service_group: ${state.data.kafka_broker_service_group}`);
            // enable_node_id: false 일 때만 명시 출력 (KRaft 기본값은 true이므로 false만 의미있음)
            if (state.data.enable_node_id === false) lines.push(`    enable_node_id: false`);

            // 로그 디렉토리 (Step 4 폼에서 직접 state.data에 쓰는 필드를 읽음)
            if (state.data.kafka_controller_log_dir) lines.push(`    kafka_controller_log_dir: ${state.data.kafka_controller_log_dir}`);
            if (state.data.kafka_broker_log_dir) lines.push(`    kafka_broker_log_dir: ${state.data.kafka_broker_log_dir}`);
            if (state.data.components.schema_registry && state.data.schema_registry_log_dir) lines.push(`    schema_registry_log_dir: ${state.data.schema_registry_log_dir}`);
            if (state.data.components.control_center_next_gen && state.data.control_center_next_gen_log_dir) lines.push(`    control_center_next_gen_log_dir: ${state.data.control_center_next_gen_log_dir}`);
            lines.push('');

            lines.push('    # === Step 5: Listener & Encryption ===');
            const globalSaslProtocol = state.data.listener_protocol.includes('SASL') ?
                (state.data.sasl_mechanism === 'plain' ? 'plain' : state.data.sasl_mechanism) : 'none';
            lines.push(`    sasl_protocol: ${globalSaslProtocol}`);
            // kafka_controller_sasl_protocol: KRaft Controller 프로토콜에서 SASL 여부 결정
            // SASL 포함 프로토콜이면 글로벌 sasl_mechanism을 따르고, 아니면 none
            {
                const ctrlProto = state.data.kraft_controller_security_protocol;
                const ctrlSasl = ctrlProto.includes('SASL') ? globalSaslProtocol : 'none';
                lines.push(`    kafka_controller_sasl_protocol: ${ctrlSasl}`);
            }
            // kafka_broker_sasl_protocol: 브로커 SASL 프로토콜 (글로벌 sasl_protocol과 동일하면 생략 가능하나 명시 권장)
            if (state.data.kafka_broker_sasl_protocol_override) {
                lines.push(`    kafka_broker_sasl_protocol: ${state.data.kafka_broker_sasl_protocol_override}`);
            } else if (globalSaslProtocol !== 'none') {
                lines.push(`    kafka_broker_sasl_protocol: ${globalSaslProtocol}`);
            }
            if (state.data.listener_protocol.includes('SSL')) {
                if (state.data.ssl_method === 'provided-keystore') {
                    lines.push(`    ssl_provided_keystore_and_truststore: true`);
                    if (state.data.ssl_keystore_path) lines.push(`    ssl_keystore_filepath: ${state.data.ssl_keystore_path}`);
                    if (state.data.ssl_keystore_password) lines.push(`    ssl_keystore_store_password: ${state.data.ssl_keystore_password}`);
                    if (state.data.ssl_truststore_path) lines.push(`    ssl_truststore_filepath: ${state.data.ssl_truststore_path}`);
                    if (state.data.ssl_truststore_password) lines.push(`    ssl_truststore_password: ${state.data.ssl_truststore_password}`);
                    if (state.data.ssl_provided_keystore_and_truststore_remote_src) {
                        lines.push(`    ssl_provided_keystore_and_truststore_remote_src: true`);
                    }
                }
                if (state.data.ssl_method === 'custom-certs') {
                    lines.push('    ssl_custom_certs: true');
                    if (state.data.ssl_ca_cert_path) lines.push(`    ssl_ca_cert_filepath: ${state.data.ssl_ca_cert_path}`);
                    if (state.data.ssl_signed_cert_path) lines.push(`    ssl_signed_cert_filepath: ${state.data.ssl_signed_cert_path}`);
                    if (state.data.ssl_key_path) lines.push(`    ssl_key_filepath: ${state.data.ssl_key_path}`);
                    if (state.data.ssl_key_password) lines.push(`    ssl_key_password: ${state.data.ssl_key_password}`);
                    if (state.data.ssl_custom_certs_remote_src) {
                        lines.push(`    ssl_custom_certs_remote_src: true`);
                    }
                }
                if (state.data.ssl_method === 'self-signed' && !state.data.regenerate_ca) {
                    lines.push(`    regenerate_ca: false`);
                }
                if (state.data.ssl_mutual_auth_enabled) {
                    lines.push('    ssl_mutual_auth_enabled: true');
                }
            }
            // 신규 SSL 필드 (ssl_enabled 방식, 리스너 프로토콜과 무관하게 state에 있으면 출력)
            if (state.data.ssl_enabled) {
                lines.push('    ssl_enabled: true');
            }
            if (state.data.ssl_keystore_and_truststore_custom_password) {
                lines.push('    ssl_keystore_and_truststore_custom_password: true');
            }
            if (state.data.ssl_client_authentication) {
                lines.push(`    ssl_client_authentication: ${state.data.ssl_client_authentication}`);
            }
            // Per-component keystore/truststore 패스워드 (12개)
            ['kafka_controller', 'kafka_broker', 'schema_registry', 'control_center_next_gen'].forEach(comp => {
                const ks = state.data[`${comp}_keystore_storepass`];
                const kk = state.data[`${comp}_keystore_keypass`];
                const ts = state.data[`${comp}_truststore_storepass`];
                if (ks !== undefined) lines.push(`    ${comp}_keystore_storepass: ${ks}`);
                if (kk !== undefined) lines.push(`    ${comp}_keystore_keypass: ${kk}`);
                if (ts !== undefined) lines.push(`    ${comp}_truststore_storepass: ${ts}`);
            });
            // FIPS는 Listener/암호화 설정(Step 5)의 일부이므로 여기에 출력
            if (state.data.fips_enabled) {
                lines.push(`    fips_enabled: true`);
                lines.push(`    fips_mode: ${state.data.fips_mode}`);
            }
            lines.push('');

            if (state.data.sasl_mechanism === 'plain' && Object.keys(state.data.sasl_plain_users).length > 0) {
                lines.push('    # === Step 6: SASL Users ===');
                lines.push('    sasl_plain_users:');
                Object.entries(state.data.sasl_plain_users).forEach(([user, pass]) => {
                    if (!user) return;
                    lines.push(`      ${user}:`);
                    // pass may be an object {principal, password} (cp-ansible format) or a plain string (password)
                    if (typeof pass === 'object' && pass !== null) {
                        lines.push(`        principal: ${pass.principal || user}`);
                        lines.push(`        password: ${pass.password || ''}`);
                    } else {
                        lines.push(`        principal: ${user}`);
                        lines.push(`        password: ${pass}`);
                    }
                });
                lines.push('');
            }

            if ((state.data.sasl_mechanism === 'scram-sha-512' || state.data.sasl_mechanism === 'scram-sha-256') &&
                Object.keys(state.data.sasl_scram_users || {}).length > 0) {
                lines.push('    # === Step 6: SASL SCRAM Users ===');
                lines.push('    sasl_scram_users:');
                Object.entries(state.data.sasl_scram_users).forEach(([user, pass]) => {
                    if (!user) return;
                    lines.push(`      ${user}:`);
                    if (typeof pass === 'object' && pass !== null) {
                        lines.push(`        principal: ${pass.principal || user}`);
                        lines.push(`        password: ${pass.password || ''}`);
                    } else {
                        lines.push(`        principal: ${user}`);
                        lines.push(`        password: ${pass}`);
                    }
                });
                lines.push('');
            }

            if (state.data.sasl_mechanism === 'kerberos') {
                lines.push('    # === Step 6: Kerberos ===');
                if (state.data.kerberos_realm) lines.push(`    kerberos_kafka_broker_primary: kafka`);
                if (state.data.kerberos_realm) lines.push(`    realm: ${state.data.kerberos_realm}`);
                if (state.data.kerberos_kdc_hostname) lines.push(`    kdc_hostname: ${state.data.kerberos_kdc_hostname}`);
                lines.push('');
            }

            if (state.data.sasl_mechanism === 'oauth') {
                lines.push('    # === Step 6: OAUTHBEARER ===');
                if (state.data.oauth_token_uri) lines.push(`    oauth_token_uri: ${state.data.oauth_token_uri}`);
                if (state.data.oauth_issuer_url) lines.push(`    oauth_issuer_url: ${state.data.oauth_issuer_url}`);
                if (state.data.oauth_jwks_uri) lines.push(`    oauth_jwks_uri: ${state.data.oauth_jwks_uri}`);
                if (state.data.oauth_sub_claim) lines.push(`    oauth_sub_claim: ${state.data.oauth_sub_claim}`);
                if (state.data.oauth_groups_claim) lines.push(`    oauth_groups_claim: ${state.data.oauth_groups_claim}`);
                lines.push('');
            }

            if (state.data.authorization_type === 'rbac') {
                lines.push('    # === Step 7: Authorization (RBAC) ===');
                lines.push(`    rbac_enabled: true`);
                lines.push(`    mds_super_user: ${state.data.mds_super_user}`);
                if (state.data.mds_super_user_password) {
                    lines.push(`    mds_super_user_password: ${state.data.mds_super_user_password}`);
                }
                // MDS LDAP 바인드 계정 (Authentik/LDAP 연동 시 MDS가 사용하는 서비스 바인드 DN)
                if (state.data.mds_ldap_user) lines.push(`    mds_ldap_user: "${state.data.mds_ldap_user}"`);
                if (state.data.mds_ldap_password) lines.push(`    mds_ldap_password: ${state.data.mds_ldap_password}`);
                // SR 서비스 계정 (RBAC에서 Schema Registry가 MDS에 인증할 때 사용)
                if (state.data.sr_service_user) lines.push(`    sr_service_user: ${state.data.sr_service_user}`);
                if (state.data.sr_service_password) lines.push(`    sr_service_password: "${state.data.sr_service_password}"`);
                if (state.data.rbac_super_users.length > 0) {
                    lines.push('    rbac_super_users:');
                    state.data.rbac_super_users.forEach(user => {
                        if (user) lines.push(`      - "${user}"`);
                    });
                }

                Object.entries(state.data.component_ldap_users).forEach(([key, value]) => {
                    if (value) lines.push(`    ${key}: "${value}"`);
                });
                // create_mds_certs: true일 때만 출력 (false는 cp-ansible 기본값이므로 생략)
                if (state.data.create_mds_certs === true) {
                    lines.push('    create_mds_certs: true');
                }
                // mds_broker_listener: SSL이 활성화되어 있거나 mTLS가 필요한 경우에만 출력.
                // ssl_enabled=false(SASL_PLAINTEXT 환경 기본값)인 경우 cp-ansible이 자동 처리하므로 생략.
                {
                    const mdsSslEnabled = state.data.mds_broker_listener_ssl_enabled;
                    const mdsMutualAuth = state.data.mds_broker_listener_ssl_mutual_auth_enabled;
                    const mdsSasl = state.data.mds_broker_listener_sasl_protocol;
                    // SSL이 켜져 있거나 mTLS가 활성화된 경우에만 블록 출력
                    if (mdsSslEnabled === true || mdsMutualAuth === true) {
                        lines.push('    mds_broker_listener:');
                        lines.push(`      ssl_enabled: ${mdsSslEnabled ? 'true' : 'false'}`);
                        lines.push(`      ssl_mutual_auth_enabled: ${mdsMutualAuth ? 'true' : 'false'}`);
                        lines.push(`      sasl_protocol: ${mdsSasl}`);

                }
                if (state.data.kafka_broker_rest_proxy_enabled) {
                    lines.push('    kafka_broker_rest_proxy_enabled: true');

                if (state.data.token_services_public_pem_file) {

            if (state.data.ldap_enabled) {

                if (state.data.ldap_user_search_base) lines.push(`    ldap_user_search_base: "${state.data.ldap_user_search_base}"`);
                if (state.data.ldap_group_search_base) lines.push(`    ldap_group_search_base: "${state.data.ldap_group_search_base}"`);
                if (state.data.ldap_bind_dn) lines.push(`    ldap_bind_dn: "${state.data.ldap_bind_dn}"`);
                if (state.data.ldap_bind_password) lines.push(`    ldap_bind_password: "${state.data.ldap_bind_password}"`);
                lines.push(`    ldap_user_name_attribute: ${state.data.ldap_user_name_attribute}`);
                lines.push(`    ldap_user_object_class: ${state.data.ldap_user_object_class}`);

                lines.push(`    ldap_group_member_attribute: ${state.data.ldap_group_member_attribute}`);
                // ldap_search_mode: cp-ansible 기본값인 'GROUPS'는 생략하고 'USERS' 등 변경 시에만 출력
                if (state.data.ldap_search_mode && state.data.ldap_search_mode !== 'GROUPS')
                    lines.push(`    ldap_search_mode: ${state.data.ldap_search_mode}`);
                if (state.data.ldap_group_name_attribute) lines.push(`    ldap_group_name_attribute: ${state.data.ldap_group_name_attribute}`);
                if (state.data.ldap_group_member_attribute_pattern) lines.push(`    ldap_group_member_attribute_pattern: ${state.data.ldap_group_member_attribute_pattern}`);
                if (state.data.ldap_user_memberof_attribute) lines.push(`    ldap_user_memberof_attribute: ${state.data.ldap_user_memberof_attribute}`);
                lines.push('');

            // Listener name refs (inter-broker, rest-proxy, schema_registry, C3)
            if (state.data.kafka_broker_inter_broker_listener_name)
                lines.push(`    kafka_broker_inter_broker_listener_name: ${state.data.kafka_broker_inter_broker_listener_name}`);
            if (state.data.kafka_broker_rest_proxy_listener_name)
                lines.push(`    kafka_broker_rest_proxy_listener_name: ${state.data.kafka_broker_rest_proxy_listener_name}`);

            if (state.data.control_center_next_gen_ldap_user)

            if (state.data.control_center_next_gen_ldap_password)

                lines.push(`    schema_registry_ldap_user: ${state.data.schema_registry_ldap_user}`);
            if (state.data.schema_registry_ldap_password)
                lines.push(`    schema_registry_ldap_password: ${state.data.schema_registry_ldap_password}`);

            // metrics_reporter_enabled
            if (state.data.kafka_controller_metrics_reporter_enabled !== undefined)
                lines.push(`    kafka_controller_metrics_reporter_enabled: ${state.data.kafka_controller_metrics_reporter_enabled ? 'true' : 'false'}`);
            if (state.data.kafka_broker_metrics_reporter_enabled !== undefined)
                lines.push(`    kafka_broker_metrics_reporter_enabled: ${state.data.kafka_broker_metrics_reporter_enabled ? 'true' : 'false'}`);

            // broker_custom_properties에 log.dirs(kafka_broker_log_dirs)를 포함하여 출력
            // data_dirs.kafka_broker_log_dirs 대신 state.data.kafka_broker_log_dirs를 직접 읽음
            const brokerCustomProps = Object.assign({}, state.data.broker_custom_properties);
            if (state.data.kafka_broker_log_dirs) brokerCustomProps['log.dirs'] = state.data.kafka_broker_log_dirs;
            // Step 8: LDAP broker custom_properties 병합 (ldap.* 키들)
            if (state.data.ldap_enabled && state.data.authorization_type === 'rbac' &&
                state.data.ldap_broker_custom_props && Object.keys(state.data.ldap_broker_custom_props).length > 0) {
                Object.assign(brokerCustomProps, state.data.ldap_broker_custom_props);
            }
            if (Object.keys(brokerCustomProps).length > 0 || state.data.tiered_storage_enabled || state.data.self_balancing_enabled) {
                lines.push('    # === Step 10: Kafka Broker Custom Properties ===');
                lines.push('    kafka_broker_custom_properties:');
                Object.entries(brokerCustomProps).forEach(([key, value]) => {
                    if (key) lines.push(`      ${key}: ${yamlScalar(value)}`);
                });
                if (state.data.tiered_storage_enabled) {
                    lines.push(`      confluent.tier.feature: "true"`);
                    lines.push(`      confluent.tier.enable: "true"`);
                    lines.push(`      confluent.tier.backend: ${state.data.tiered_storage_backend}`);
                    if (state.data.tiered_storage_backend === 'S3' && state.data.tiered_storage_s3_bucket) {
                        lines.push(`      confluent.tier.s3.bucket.name: ${state.data.tiered_storage_s3_bucket}`);

                            lines.push(`      confluent.tier.s3.region: ${state.data.tiered_storage_s3_region}`);

                    }
                    if (state.data.tiered_storage_backend === 'GCS' && state.data.tiered_storage_gcs_bucket) {
                        lines.push(`      confluent.tier.gcs.bucket.name: ${state.data.tiered_storage_gcs_bucket}`);

                        lines.push(`      confluent.tier.azure.container.name: ${state.data.tiered_storage_azure_container}`);
                    }
                }
                if (state.data.self_balancing_enabled) {
                    lines.push(`      confluent.balancer.enable: "true"`);
                }
                lines.push('');
            }

            // controller_custom_properties에 log.dirs(kafka_controller_log_dirs)를 포함하여 출력

            const controllerCustomProps = Object.assign({}, state.data.kafka_controller_custom_properties || {});
            if (state.data.kafka_controller_log_dirs) controllerCustomProps['log.dirs'] = state.data.kafka_controller_log_dirs;
            if (Object.keys(controllerCustomProps).length > 0) {

                lines.push('    kafka_controller_custom_properties:');
                Object.entries(controllerCustomProps).forEach(([key, value]) => {
                    if (key) lines.push(`      ${key}: ${yamlScalar(value)}`);

            // === Step 10: Broker Enhancements (Schema Validation, Custom Listeners) ===
            // Controller custom_props 이후에 Broker 추가 설정을 출력
            {
                const hasBrokerEnhancements = state.data.kafka_broker_schema_validation_enabled ||
                    Object.keys(state.data.kafka_broker_custom_listeners).length > 0;
                if (hasBrokerEnhancements) {
                    lines.push('    # === Step 10: Broker Enhancements ===');
                    if (state.data.kafka_broker_schema_validation_enabled)
                        lines.push(`    kafka_broker_schema_validation_enabled: true`);
                    if (Object.keys(state.data.kafka_broker_custom_listeners).length > 0) {
                        lines.push('    kafka_broker_custom_listeners:');
                        Object.entries(state.data.kafka_broker_custom_listeners).forEach(([key, listenerObj]) => {
                            if (!key) return;
                            lines.push(`      ${key}:`);
                            if (typeof listenerObj === 'object' && listenerObj !== null) {
                                // nested object: name, port, ssl_enabled, ssl_mutual_auth_enabled, sasl_protocol 등
                                Object.entries(listenerObj).forEach(([lk, lv]) => {
                                    lines.push(`        ${lk}: ${yamlScalar(lv)}`);
                                });
                            } else {
                                // 단순 값 (하위 호환)
                                lines.push(`        ${yamlScalar(listenerObj)}`);

                        });

                    lines.push('');
