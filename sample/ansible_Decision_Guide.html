<!DOCTYPE html>
<html lang="ko" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP-Ansible hosts.yml Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a1f2e;
            --surface-hover: #252d3d;
            --border: #3a4556;
            --text: #e8eaed;
            --text-secondary: #9ca3af;
            --accent: #5b9ff5;
            --accent-secondary: #7fb3f5;
            --positive: #81c784;
            --negative: #e57373;
            --warning: #ffb74d;
            --info: #64b5f6;
        }

        html.theme-light {
            --bg: #ffffff;
            --surface: #f5f7fa;
            --surface-hover: #e8eef8;
            --border: #cbd5e1;
            --text: #1a202c;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-secondary: #60a5fa;
            --positive: #10b981;
            --negative: #ef4444;
            --warning: #f59e0b;
            --info: #0ea5e9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        code, pre {
            font-family: 'JetBrains Mono', monospace;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-menu {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .menu-btn {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background: var(--border);
        }

        .theme-toggle {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.25rem;
            transition: background 0.2s;
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .step-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            overflow-x: auto;
            display: flex;
            gap: 0.5rem;
            z-index: 50;
        }

        .step-dot {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .step-dot.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .step-dot.done {
            background: var(--positive);
            color: white;
            border-color: var(--positive);
        }

        .step-dot.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            color: var(--text-secondary);
        }

        .step-dot-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.5rem;
            height: 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            padding: 2rem;
        }

        .right-panel {
            width: 500px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .step-desc {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .form-section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .form-label.required::after {
            content: " *";
            color: var(--negative);
        }

        .form-help {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .text-input, .number-input, .select-input, .textarea-input {
            width: 100%;
            padding: 0.75rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        .text-input:focus, .number-input:focus, .select-input:focus, .textarea-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(91, 159, 245, 0.1);
        }

        .textarea-input {
            min-height: 100px;
            resize: vertical;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle-switch {
            position: relative;
            display: inline-flex;
            width: 2.5rem;
            height: 1.5rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-switch.active {
            background: var(--positive);
            border-color: var(--positive);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 1.25rem;
            height: 1.25rem;
            background: white;
            border-radius: 50%;
            top: 0.125rem;
            left: 0.125rem;
            transition: left 0.2s;
        }

        .toggle-switch.active::after {
            left: 1.125rem;
        }

        .radio-card-group, .checkbox-card-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .option-card {
            background: var(--surface-hover);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .option-card:hover {
            border-color: var(--accent);
            background: var(--surface);
        }

        .option-card.active {
            border-color: var(--accent);
            background: rgba(91, 159, 245, 0.1);
        }

        .option-radio, .option-check {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid var(--border);
            background: var(--surface-hover);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .option-radio {
            border-radius: 50%;
        }

        .option-card.active .option-radio,
        .option-card.active .option-check {
            border-color: var(--accent);
            background: var(--accent);
        }

        .option-radio::after {
            content: '';
            width: 0.5rem;
            height: 0.5rem;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .option-card.active .option-radio::after {
            opacity: 1;
        }

        .option-check::after {
            content: '✓';
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .option-card.active .option-check::after {
            opacity: 1;
        }

        .option-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            padding-right: 2rem;
        }

        .option-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .option-tag {
            display: inline-block;
            font-size: 0.65rem;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        .tag-recommended {
            background: rgba(129, 199, 132, 0.2);
            color: var(--positive);
        }

        .tag-not-recommended {
            background: rgba(229, 115, 115, 0.2);
            color: var(--negative);
        }

        .tag-advanced {
            background: rgba(91, 159, 245, 0.2);
            color: var(--accent);
        }

        .tag-enterprise {
            background: rgba(171, 71, 188, 0.2);
            color: #ba68c8;
        }

        .dep-notice {
            background: rgba(255, 179, 71, 0.1);
            border-left: 3px solid var(--warning);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--text);
        }

        .dep-notice::before {
            content: '⚠ ';
            font-weight: 600;
        }

        .dynamic-list {
            margin-bottom: 1rem;
        }

        .list-item {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            position: relative;
        }

        .list-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .list-item-title {
            font-weight: 500;
        }

        .list-item-remove {
            background: var(--negative);
            color: white;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.2s;
        }

        .list-item-remove:hover {
            background: #ef4444;
        }

        .add-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .add-button:hover {
            background: var(--accent-secondary);
        }

        .add-button::before {
            content: '+';
            font-weight: 700;
        }

        .kv-editor {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
        }

        .kv-pair {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            align-items: end;
        }

        .kv-pair:last-child {
            margin-bottom: 0;
        }

        .kv-remove {
            background: var(--negative);
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.2s;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .kv-remove:hover {
            background: #ef4444;
        }

        .yaml-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .yaml-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .yaml-card {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-y: auto;
            flex: 1;
            margin-bottom: 1rem;
        }

        .yaml-content {
            font-size: 0.75rem;
            line-height: 1.6;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
        }

        .yaml-comment {
            color: var(--text-secondary);
        }

        .yaml-key {
            color: var(--info);
        }

        .yaml-value {
            color: var(--positive);
        }

        .yaml-string {
            color: var(--accent);
        }

        .yaml-controls {
            display: flex;
            gap: 0.5rem;
        }

        .yaml-btn {
            flex: 1;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .yaml-btn:hover {
            background: var(--accent-secondary);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--positive);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 6px;
            font-size: 0.875rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }

        .host-input-group {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .host-input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .host-input-grid.full {
            grid-template-columns: 1fr;
        }

        @media (max-width: 960px) {
            .right-panel {
                display: none;
            }

            .radio-card-group, .checkbox-card-group {
                grid-template-columns: 1fr;
            }
        }

        .hidden {
            display: none !important;
        }

        .footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">CP-Ansible hosts.yml Generator</div>
            <div class="header-menu">
                <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>
                <button class="menu-btn" id="exportPng">PNG 내보내기</button>
                <button class="menu-btn" id="downloadYaml">YAML 다운로드</button>
                <button class="menu-btn" id="copyYaml">YAML 복사</button>
                <button class="menu-btn" id="resetAll">초기화</button>
            </div>
        </div>

        <div class="step-bar" id="stepBar"></div>

        <div class="main">
            <div class="left-panel" id="leftPanel"></div>
            <div class="right-panel">
                <div class="yaml-title">YAML 미리보기</div>
                <div class="yaml-card">
                    <div class="yaml-content" id="yamlPreview"></div>
                </div>
                <div class="yaml-controls">
                    <button class="yaml-btn" id="copyYamlBtn">복사</button>
                    <button class="yaml-btn" id="downloadYamlBtn">다운로드</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <span>Confluent Platform 8.x KRaft / cp-ansible 기반</span>
            <span id="footerStatus"></span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('theme-dark')) {
                html.classList.remove('theme-dark');
                html.classList.add('theme-light');
                document.getElementById('themeToggle').textContent = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.remove('theme-light');
                html.classList.add('theme-dark');
                document.getElementById('themeToggle').textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            const html = document.documentElement;
            if (theme === 'light') {
                html.classList.add('theme-light');
                html.classList.remove('theme-dark');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        }

        // ============================================================
        // STEP RENDERING
        // ============================================================
        function renderStepBar() {
            const stepBar = document.getElementById('stepBar');
            stepBar.innerHTML = '';

            steps.forEach(step => {
                const dot = document.createElement('button');
                dot.className = 'step-dot';

                if (state.currentStep === step.id) {
                    dot.classList.add('active');
                } else if (state.completedSteps.has(step.id)) {
                    dot.classList.add('done');
                } else if (step.id > 9) {
                    dot.classList.add('disabled');
                }

                const number = document.createElement('div');
                number.className = 'step-dot-number';
                number.textContent = step.id;

                const label = document.createElement('span');
                label.textContent = step.title;

                dot.appendChild(number);
                dot.appendChild(label);

                if (step.id <= 9) {
                    dot.addEventListener('click', () => switchStep(step.id));
                }

                stepBar.appendChild(dot);
            });
        }

        function switchStep(stepId) {
            state.completedSteps.add(state.currentStep);
            state.currentStep = stepId;
            renderStepBar();
            renderStepContent();
            updateYamlPreview();
        }

        function renderStepContent() {
            const leftPanel = document.getElementById('leftPanel');
            leftPanel.innerHTML = '';

            const step = steps[state.currentStep - 1];
            if (!step) return;

            const content = document.createElement('div');
            content.className = 'step-content active';

            const title = document.createElement('h2');
            title.className = 'step-title';
            title.textContent = step.title;

            const desc = document.createElement('p');
            desc.className = 'step-desc';
            desc.textContent = step.desc;

            content.appendChild(title);
            content.appendChild(desc);

            const form = renderStepForm(state.currentStep);
            content.appendChild(form);

            leftPanel.appendChild(content);
        }

        function renderStepForm(stepId) {
            const form = document.createElement('form');

            switch(stepId) {
                case 1: return renderStep1(form);
                case 2: return renderStep2(form);
                case 3: return renderStep3(form);
                case 4: return renderStep4(form);
                case 5: return renderStep5(form);
                case 6: return renderStep6(form);
                case 7: return renderStep7(form);
                case 8: return renderStep8(form);
                case 9: return renderStep9(form);
                case 10: return renderStep10(form);
                case 11: return renderStep11(form);
                case 12: return renderStep12(form);
                case 13: return renderStep13(form);
                case 14: return renderStep14(form);
                default: return form;
            }
        }

        function renderHostList(component, label) {
            const container = document.createElement('div');
            const hosts = state.data.hosts[component] || [];

            hosts.forEach((host, idx) => {
                const item = document.createElement('div');
                item.className = 'host-input-group';

                let html = `
                    <div class="list-item-header">
                        <span class="list-item-title">${label} #${idx + 1}</span>
                        <button type="button" class="list-item-remove" data-component="${component}" data-index="${idx}">
                            삭제
                        </button>
                    </div>
                    <div class="host-input-grid">
                        <div class="form-group">
                            <label class="form-label">Hostname</label>
                            <input type="text" class="text-input" value="${host.hostname || ''}"
                                   data-component="${component}" data-index="${idx}" data-field="hostname" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">IP (ansible_host)</label>
                            <input type="text" class="text-input" value="${host.ansible_host || ''}"
                                   data-component="${component}" data-index="${idx}" data-field="ansible_host" required>
                        </div>
                `;

                if (component === 'kafka_controller') {
                    html += `
                        <div class="form-group full">
                            <label class="form-label">node_id</label>
                            <input type="number" class="number-input" value="${host.node_id || 9991}"
                                   data-component="${component}" data-index="${idx}" data-field="node_id">
                        </div>
                    `;
                } else if (component === 'kafka_broker') {
                    html += `
                        <div class="form-group full">
                            <label class="form-label">broker_id</label>
                            <input type="number" class="number-input" value="${host.broker_id || idx + 1}"
                                   data-component="${component}" data-index="${idx}" data-field="broker_id">
                        </div>
                    `;
                }

                html += `</div>`;
                item.innerHTML = html;
                container.appendChild(item);
            });

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'add-button';
            addBtn.textContent = `${label} 호스트 추가`;
            addBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!state.data.hosts[component]) {
                    state.data.hosts[component] = [];
                }

                let newHost = {
                    hostname: '',
                    ansible_host: '',
                };

                if (component === 'kafka_controller') {
                    newHost.node_id = 9991 + state.data.hosts[component].length;
                    newHost.node_ip = '';
                } else if (component === 'kafka_broker') {
                    newHost.broker_id = state.data.hosts[component].length + 1;
                    newHost.broker_ip = '';
                }

                state.data.hosts[component].push(newHost);
                renderStepContent();
                updateYamlPreview();
            });
            container.appendChild(addBtn);

            container.addEventListener('change', (e) => {
                if (e.target.dataset.component && e.target.dataset.field) {
                    const comp = e.target.dataset.component;
                    const idx = parseInt(e.target.dataset.index);
                    const field = e.target.dataset.field;
                    state.data.hosts[comp][idx][field] = e.target.type === 'number' ?
                        parseInt(e.target.value) : e.target.value;
                    updateYamlPreview();
                }
            });

            container.addEventListener('click', (e) => {
                if (e.target.classList.contains('list-item-remove')) {
                    e.preventDefault();
                    const comp = e.target.dataset.component;
                    const idx = parseInt(e.target.dataset.index);
                    state.data.hosts[comp].splice(idx, 1);
                    renderStepContent();
                    updateYamlPreview();
                }
            });

            return container;
        }

        // ============================================================
        // FORM HELPERS
        // ============================================================
        function createFormSection(title, fields) {
            const section = document.createElement('div');
            section.className = 'form-section';

            if (title) {
                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'form-section-title';
                sectionTitle.textContent = title;
                section.appendChild(sectionTitle);
            }

            fields.forEach(field => {
                if (field.visible && !field.visible()) {
                    return;
                }

                const group = document.createElement('div');
                group.className = 'form-group';

                switch(field.type) {
                    case 'text':
                    case 'number':
                        const label = document.createElement('label');
                        label.className = 'form-label' + (field.required ? ' required' : '');
                        label.textContent = field.label;
                        group.appendChild(label);

                        const input = document.createElement('input');
                        input.type = field.inputType || field.type;
                        input.className = field.type === 'number' ? 'number-input' : 'text-input';
                        input.value = state.data[field.key] || field.default || '';
                        input.required = field.required || false;
                        input.addEventListener('change', (e) => {
                            state.data[field.key] = field.type === 'number' ?
                                parseInt(e.target.value) : e.target.value;
                            updateYamlPreview();
                        });
                        group.appendChild(input);

                        if (field.help) {
                            const help = document.createElement('div');
                            help.className = 'form-help';
                            help.textContent = field.help;
                            group.appendChild(help);
                        }
                        break;

                    case 'select':
                        const selectLabel = document.createElement('label');
                        selectLabel.className = 'form-label';
                        selectLabel.textContent = field.label;
                        group.appendChild(selectLabel);

                        const select = document.createElement('select');
                        select.className = 'select-input';
                        select.value = state.data[field.key] || '';
                        field.options.forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt.value;
                            option.textContent = opt.label;
                            select.appendChild(option);
                        });
                        select.addEventListener('change', (e) => {
                            state.data[field.key] = e.target.value;
                            renderStepContent();
                            updateYamlPreview();
                        });
                        group.appendChild(select);
                        break;

                    case 'toggle':
                        const toggleLabel = document.createElement('label');
                        toggleLabel.className = 'form-label';
                        toggleLabel.style.display = 'flex';
                        toggleLabel.style.alignItems = 'center';
                        toggleLabel.style.gap = '0.5rem';

                        const toggle = document.createElement('div');
                        toggle.className = 'toggle-switch' + (state.data[field.key] ? ' active' : '');
                        toggle.addEventListener('click', () => {
                            state.data[field.key] = !state.data[field.key];
                            toggle.classList.toggle('active');
                            renderStepContent();
                            updateYamlPreview();
                        });

                        toggleLabel.appendChild(toggle);
                        toggleLabel.appendChild(document.createTextNode(field.label));
                        group.appendChild(toggleLabel);

                        if (field.help) {
                            const help = document.createElement('div');
                            help.className = 'form-help';
                            help.style.marginTop = '0.5rem';
                            help.textContent = field.help;
                            group.appendChild(help);
                        }
                        break;

                    case 'radio':
                        const radioLabel = document.createElement('label');
                        radioLabel.className = 'form-label';
                        radioLabel.textContent = field.label;
                        group.appendChild(radioLabel);

                        const radioContainer = document.createElement('div');
                        radioContainer.className = 'radio-card-group';
                        field.options.forEach(opt => {
                            if (opt.disabled) return;

                            const card = document.createElement('div');
                            card.className = 'option-card' + (state.data[field.key] === opt.value ? ' active' : '');

                            const radio = document.createElement('div');
                            radio.className = 'option-radio';
                            card.appendChild(radio);

                            const title = document.createElement('div');
                            title.className = 'option-title';
                            title.textContent = opt.label;
                            card.appendChild(title);

                            if (opt.desc) {
                                const desc = document.createElement('div');
                                desc.className = 'option-desc';
                                desc.textContent = opt.desc;
                                card.appendChild(desc);
                            }

                            if (opt.tag) {
                                const tag = document.createElement('div');
                                tag.className = 'option-tag ' + opt.tag.class;
                                tag.textContent = opt.tag.text;
                                card.appendChild(tag);
                            }

                            card.addEventListener('click', () => {
                                state.data[field.key] = opt.value;
                                renderStepContent();
                                updateYamlPreview();
                            });

                            radioContainer.appendChild(card);
                        });
                        group.appendChild(radioContainer);
                        break;

                    case 'checkbox':
                        const checkboxLabel = document.createElement('label');
                        checkboxLabel.className = 'form-label';
                        checkboxLabel.textContent = field.label;
                        group.appendChild(checkboxLabel);

                        const checkboxContainer = document.createElement('div');
                        checkboxContainer.className = 'checkbox-card-group';
                        field.options.forEach(opt => {
                            const card = document.createElement('div');
                            card.className = 'option-card' + (state.data[field.key][opt.value] ? ' active' : '') +
                                           (opt.disabled ? ' disabled' : '');

                            if (opt.disabled) {
                                card.style.cursor = 'not-allowed';
                                card.style.opacity = '0.6';
                            }

                            const checkbox = document.createElement('div');
                            checkbox.className = 'option-check';
                            card.appendChild(checkbox);

                            const title = document.createElement('div');
                            title.className = 'option-title';
                            title.textContent = opt.label;
                            card.appendChild(title);

                            if (opt.help) {
                                const help = document.createElement('div');
                                help.className = 'option-desc';
                                help.textContent = opt.help;
                                card.appendChild(help);
                            }

                            if (!opt.disabled) {
                                card.addEventListener('click', () => {
                                    state.data[field.key][opt.value] = !state.data[field.key][opt.value];
                                    renderStepContent();
                                    updateYamlPreview();
                                });
                            }

                            checkboxContainer.appendChild(card);
                        });
                        group.appendChild(checkboxContainer);
                        break;

                    case 'textarea':
                        const textareaLabel = document.createElement('label');
                        textareaLabel.className = 'form-label';
                        textareaLabel.textContent = field.label;
                        group.appendChild(textareaLabel);

                        const textarea = document.createElement('textarea');
                        textarea.className = 'textarea-input';
                        textarea.value = state.data[field.key] || '';
                        textarea.addEventListener('change', (e) => {
                            state.data[field.key] = e.target.value;
                            updateYamlPreview();
                        });
                        group.appendChild(textarea);

                        if (field.help) {
                            const help = document.createElement('div');
                            help.className = 'form-help';
                            help.textContent = field.help;
                            group.appendChild(help);
                        }
                        break;
                }

                section.appendChild(group);
            });

            return section;
        }

        function renderKeyValueEditor(key, keyLabel, valueLabel) {
            const container = document.createElement('div');
            container.className = 'kv-editor';

            const data = state.data[key] || {};
            const entries = Array.isArray(data) ? data : Object.entries(data).map(([k, v]) => ({ key: k, value: v }));

            entries.forEach((entry, idx) => {
                const pair = document.createElement('div');
                pair.className = 'kv-pair';

                const keyInput = document.createElement('input');
                keyInput.type = 'text';
                keyInput.className = 'text-input';
                keyInput.placeholder = keyLabel;
                keyInput.value = typeof entry === 'object' && entry.key ? entry.key : entry;

                const valueInput = document.createElement('input');
                valueInput.type = 'text';
                valueInput.className = 'text-input';
                valueInput.placeholder = valueLabel;
                valueInput.value = typeof entry === 'object' && entry.value ? entry.value : '';

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'kv-remove';
                removeBtn.textContent = '✕';
                removeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    entries.splice(idx, 1);
                    updateStateFromKeyValueEditor(key, entries);
                });

                pair.appendChild(keyInput);
                pair.appendChild(valueInput);
                pair.appendChild(removeBtn);
                container.appendChild(pair);

                [keyInput, valueInput].forEach(input => {
                    input.addEventListener('change', () => {
                        entries[idx] = { key: keyInput.value, value: valueInput.value };
                        updateStateFromKeyValueEditor(key, entries);
                    });
                });
            });

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'add-button';
            addBtn.style.marginTop = '1rem';
            addBtn.textContent = '항목 추가';
            addBtn.addEventListener('click', (e) => {
                e.preventDefault();
                entries.push({ key: '', value: '' });
                renderStepContent();
                updateYamlPreview();
            });
            container.appendChild(addBtn);

            return container;
        }

        function renderKeyValueEditorSimple(key, keyLabel) {
            const container = document.createElement('div');
            container.className = 'kv-editor';

            const data = state.data[key] || [];

            data.forEach((item, idx) => {
                const pair = document.createElement('div');
                pair.className = 'kv-pair';

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'text-input';
                input.placeholder = keyLabel;
                input.value = item;
                input.style.gridColumn = '1 / 3';

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'kv-remove';
                removeBtn.textContent = '✕';
                removeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    state.data[key].splice(idx, 1);
                    renderStepContent();
                    updateYamlPreview();
                });

                pair.appendChild(input);
                pair.appendChild(removeBtn);
                container.appendChild(pair);

                input.addEventListener('change', () => {
                    state.data[key][idx] = input.value;
                    updateYamlPreview();
                });
            });

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'add-button';
            addBtn.style.marginTop = '1rem';
            addBtn.textContent = '항목 추가';
            addBtn.addEventListener('click', (e) => {
                e.preventDefault();
                state.data[key].push('');
                renderStepContent();
                updateYamlPreview();
            });
            container.appendChild(addBtn);

            return container;
        }

        function updateStateFromKeyValueEditor(key, entries) {
            state.data[key] = {};
            entries.forEach(entry => {
                if (entry.key) {
                    state.data[key][entry.key] = entry.value;
                }
            });
            updateYamlPreview();
        }

        // ============================================================
        // YAML GENERATION
        // ============================================================
        function generateYaml() {
            const lines = [];

            lines.push('---');
            lines.push('# Confluent Platform hosts.yml');
            lines.push('# Generated by CP-Ansible hosts.yml Generator');
            lines.push('');
            lines.push('all:');
            lines.push('  vars:');

            lines.push('    # === Step 1: Basic Environment ===');
            lines.push(`    ansible_connection: ${state.data.ansible_connection}`);
            if (state.data.ansible_user) lines.push(`    ansible_user: ${state.data.ansible_user}`);
            lines.push(`    ansible_port: ${state.data.ansible_port}`);
            lines.push(`    ansible_become: ${state.data.ansible_become ? 'true' : 'false'}`);
            if (state.data.ansible_python_interpreter) {
                lines.push(`    ansible_python_interpreter: ${state.data.ansible_python_interpreter}`);
            }
            lines.push(`    deployment_strategy: ${state.data.deployment_strategy}`);
            lines.push(`    ansible_strategy: ${state.data.ansible_strategy}`);
            if (state.data.install_java === false && state.data.custom_java_path) {
                lines.push(`    install_java: false`);
                lines.push(`    custom_java_path: ${state.data.custom_java_path}`);
            } else {
                lines.push(`    install_java: ${state.data.install_java ? 'true' : 'false'}`);
            }
            lines.push('');

            lines.push('    # === Step 2: Installation Method ===');
            lines.push(`    installation_method: ${state.data.installation_method}`);
            lines.push(`    confluent_package_version: "${state.data.confluent_package_version}"`);
            if (state.data.installation_method === 'archive') {
                if (state.data.confluent_archive_file_source) {
                    lines.push(`    confluent_archive_file_source: ${state.data.confluent_archive_file_source}`);
                }
                lines.push(`    confluent_archive_file_remote: ${state.data.confluent_archive_file_remote ? 'true' : 'false'}`);
                if (state.data.archive_destination_path) {
                    lines.push(`    archive_destination_path: ${state.data.archive_destination_path}`);
                }
                if (state.data.archive_owner) {
                    lines.push(`    archive_owner: ${state.data.archive_owner}`);
                }
                if (state.data.archive_group) {
                    lines.push(`    archive_group: ${state.data.archive_group}`);
                }
            }
            if (state.data.repository_configuration === 'custom') {
                if (state.data.custom_yum_repo_path) lines.push(`    custom_yum_repofile_path: ${state.data.custom_yum_repo_path}`);
                if (state.data.custom_apt_repo_path) lines.push(`    custom_apt_repo_filepath: ${state.data.custom_apt_repo_path}`);
            }
            if (state.data.components.control_center_next_gen) {
                lines.push(`    confluent_control_center_next_gen_package_version: "${state.data.confluent_control_center_next_gen_package_version}"`);
            }
            lines.push(`    confluent_server_enabled: ${state.data.confluent_server_enabled ? 'true' : 'false'}`);
            lines.push(`    confluent_cli_download_enabled: ${state.data.confluent_cli_download_enabled ? 'true' : 'false'}`);
            lines.push('');

            lines.push('    # === Step 4: Users/Groups/Paths ===');
            if (state.data.common_user_group) {
                if (state.data.common_user) lines.push(`    kafka_controller_user: ${state.data.common_user}`);
                if (state.data.common_group) lines.push(`    kafka_controller_group: ${state.data.common_group}`);
                if (state.data.common_user) lines.push(`    kafka_broker_user: ${state.data.common_user}`);
                if (state.data.common_group) lines.push(`    kafka_broker_group: ${state.data.common_group}`);
                if (state.data.components.schema_registry) {
                    if (state.data.common_user) lines.push(`    schema_registry_user: ${state.data.common_user}`);
                    if (state.data.common_group) lines.push(`    schema_registry_group: ${state.data.common_group}`);
                }
                if (state.data.components.control_center_next_gen) {
                    if (state.data.common_user) lines.push(`    control_center_next_gen_user: ${state.data.common_user}`);
                    if (state.data.common_group) lines.push(`    control_center_next_gen_group: ${state.data.common_group}`);
                }
            } else {
                Object.entries(state.data.component_users).forEach(([key, value]) => {
                    if (value) lines.push(`    ${key}: ${value}`);
                });
            }

            Object.entries(state.data.log_dirs).forEach(([key, value]) => {
                if (value) lines.push(`    ${key}: ${value}`);
            });

            if (state.data.data_dirs.kafka_broker_log_dirs) {
                lines.push('    kafka_broker_custom_properties:');
                lines.push(`      log.dirs: ${state.data.data_dirs.kafka_broker_log_dirs}`);
            }
            if (state.data.data_dirs.kafka_controller_log_dirs) {
                if (!state.data.data_dirs.kafka_broker_log_dirs) {
                    lines.push('    kafka_controller_custom_properties:');
                }
                lines.push(`      log.dirs: ${state.data.data_dirs.kafka_controller_log_dirs}`);
            }
            lines.push('');

            lines.push('    # === Step 5: Listener & Encryption ===');
            lines.push(`    sasl_protocol: ${state.data.listener_protocol.includes('SASL') ?
                (state.data.sasl_mechanism === 'plain' ? 'plain' : state.data.sasl_mechanism) : 'none'}`);
            lines.push(`    kafka_controller_sasl_protocol: ${state.data.kraft_controller_security_protocol === 'PLAINTEXT' ? 'none' : 'plain'}`);
            if (state.data.listener_protocol.includes('SSL')) {
                if (state.data.ssl_method === 'provided-keystore') {
                    lines.push(`    ssl_provided_keystore_and_truststore: true`);
                    if (state.data.ssl_keystore_path) lines.push(`    ssl_keystore_filepath: ${state.data.ssl_keystore_path}`);
                    if (state.data.ssl_keystore_password) lines.push(`    ssl_keystore_store_password: ${state.data.ssl_keystore_password}`);
                    if (state.data.ssl_truststore_path) lines.push(`    ssl_truststore_filepath: ${state.data.ssl_truststore_path}`);
                    if (state.data.ssl_truststore_password) lines.push(`    ssl_truststore_password: ${state.data.ssl_truststore_password}`);
                    if (state.data.ssl_provided_keystore_and_truststore_remote_src) {
                        lines.push(`    ssl_provided_keystore_and_truststore_remote_src: true`);
                    }
                }
                if (state.data.ssl_method === 'custom-certs') {
                    lines.push('    ssl_custom_certs: true');
                    if (state.data.ssl_ca_cert_path) lines.push(`    ssl_ca_cert_filepath: ${state.data.ssl_ca_cert_path}`);
                    if (state.data.ssl_signed_cert_path) lines.push(`    ssl_signed_cert_filepath: ${state.data.ssl_signed_cert_path}`);
                    if (state.data.ssl_key_path) lines.push(`    ssl_key_filepath: ${state.data.ssl_key_path}`);
                    if (state.data.ssl_key_password) lines.push(`    ssl_key_password: ${state.data.ssl_key_password}`);
                    if (state.data.ssl_custom_certs_remote_src) {
                        lines.push(`    ssl_custom_certs_remote_src: true`);
                    }
                }
                if (state.data.ssl_method === 'self-signed' && !state.data.regenerate_ca) {
                    lines.push(`    regenerate_ca: false`);
                }
                if (state.data.ssl_mutual_auth_enabled) {

                        lines.push(`    kafka_broker_client_secrets_protection_encrypt_properties: "${state.data.kafka_broker_client_secrets_protection_encrypt_properties}"`);
                }
                if (!state.data.kafka_controller_client_secrets_protection_enabled)
                    lines.push('    kafka_controller_client_secrets_protection_enabled: false');
                else {
                    if (!state.data.kafka_controller_client_secrets_protection_encrypt_passwords)
                        lines.push('    kafka_controller_client_secrets_protection_encrypt_passwords: false');
                    if (state.data.kafka_controller_client_secrets_protection_encrypt_properties)
                        lines.push(`    kafka_controller_client_secrets_protection_encrypt_properties: "${state.data.kafka_controller_client_secrets_protection_encrypt_properties}"`);
                }
            }

            if (state.data.telemetry_enabled) {
                lines.push('    telemetry_enabled: true');
                if (state.data.telemetry_api_key)
                    lines.push(`    telemetry_api_key: ${state.data.telemetry_api_key}`);
                if (state.data.telemetry_api_secret)
                    lines.push(`    telemetry_api_secret: ${state.data.telemetry_api_secret}`);
                if (state.data.telemetry_proxy_url)
                    lines.push(`    telemetry_proxy_url: ${state.data.telemetry_proxy_url}`);
                if (state.data.telemetry_proxy_username)
                    lines.push(`    telemetry_proxy_username: ${state.data.telemetry_proxy_username}`);
                if (state.data.telemetry_proxy_password)
                    lines.push(`    telemetry_proxy_password: ${state.data.telemetry_proxy_password}`);
                if (!state.data.kafka_broker_telemetry_enabled) lines.push(`    kafka_broker_telemetry_enabled: false`);
                if (!state.data.schema_registry_telemetry_enabled) lines.push(`    schema_registry_telemetry_enabled: false`);
                if (!state.data.kafka_connect_telemetry_enabled) lines.push(`    kafka_connect_telemetry_enabled: false`);
                if (!state.data.ksql_telemetry_enabled) lines.push(`    ksql_telemetry_enabled: false`);
                if (!state.data.kafka_rest_telemetry_enabled) lines.push(`    kafka_rest_telemetry_enabled: false`);
                if (!state.data.control_center_next_gen_telemetry_enabled) lines.push(`    control_center_next_gen_telemetry_enabled: false`);
            }

            if (state.data.audit_logs_destination_enabled) {
                lines.push('    audit_logs_destination_enabled: true');
                if (state.data.audit_logs_destination_bootstrap_servers)
                    lines.push(`    audit_logs_destination_bootstrap_servers: "${state.data.audit_logs_destination_bootstrap_servers}"`);
                if (state.data.audit_logs_destination_listener)
                    lines.push(`    audit_logs_destination_listener: ${state.data.audit_logs_destination_listener}`);
                if (state.data.audit_logs_destination_principal)
                    lines.push(`    audit_logs_destination_principal: ${state.data.audit_logs_destination_principal}`);
                if (state.data.audit_logs_destination_erp_url)
                    lines.push(`    audit_logs_destination_erp_url: ${state.data.audit_logs_destination_erp_url}`);
                if (state.data.audit_logs_destination_admin_user)
                    lines.push(`    audit_logs_destination_admin_user: ${state.data.audit_logs_destination_admin_user}`);
                if (state.data.audit_logs_destination_admin_password)
                    lines.push(`    audit_logs_destination_admin_password: ${state.data.audit_logs_destination_admin_password}`);
            }

            if (state.data.logredactor_enabled) {
                lines.push('    logredactor_enabled: true');
                if (state.data.logredactor_rule_url)
                    lines.push(`    logredactor_rule_url: ${state.data.logredactor_rule_url}`);
                if (state.data.logredactor_rule_path)
                    lines.push(`    logredactor_rule_path: ${state.data.logredactor_rule_path}`);
                if (state.data.logredactor_rule_path_local)
                    lines.push(`    logredactor_rule_path_local: ${state.data.logredactor_rule_path_local}`);
                if (state.data.custom_log4j)
                    lines.push(`    custom_log4j: true`);
            }

            if (state.data.ccloud_kafka_enabled) {
                lines.push('    ccloud_kafka_enabled: true');
                if (state.data.ccloud_kafka_bootstrap_servers)
                    lines.push(`    ccloud_kafka_bootstrap_servers: "${state.data.ccloud_kafka_bootstrap_servers}"`);
                if (state.data.ccloud_kafka_key)
                    lines.push(`    ccloud_kafka_key: ${state.data.ccloud_kafka_key}`);
                if (state.data.ccloud_kafka_secret)
                    lines.push(`    ccloud_kafka_secret: ${state.data.ccloud_kafka_secret}`);
            }

            if (state.data.ccloud_schema_registry_enabled) {
                lines.push('    ccloud_schema_registry_enabled: true');
                if (state.data.ccloud_schema_registry_url)
                    lines.push(`    ccloud_schema_registry_url: "${state.data.ccloud_schema_registry_url}"`);
                if (state.data.ccloud_schema_registry_key)
                    lines.push(`    ccloud_schema_registry_key: ${state.data.ccloud_schema_registry_key}`);
                if (state.data.ccloud_schema_registry_secret)
                    lines.push(`    ccloud_schema_registry_secret: ${state.data.ccloud_schema_registry_secret}`);
            }

            // Per-component copy_files
            if (Object.keys(state.data.kafka_controller_copy_files).length > 0) {
                lines.push('    kafka_controller_copy_files:');
                Object.entries(state.data.kafka_controller_copy_files).forEach(([source, dest]) => {
                    if (source) lines.push(`      - { source_path: "${source}", destination_path: "${dest}" }`);
                });
            }
            if (Object.keys(state.data.kafka_broker_copy_files).length > 0) {
                lines.push('    kafka_broker_copy_files:');
                Object.entries(state.data.kafka_broker_copy_files).forEach(([source, dest]) => {
                    if (source) lines.push(`      - { source_path: "${source}", destination_path: "${dest}" }`);
                });
            }
            if (Object.keys(state.data.schema_registry_copy_files).length > 0) {
                lines.push('    schema_registry_copy_files:');
                Object.entries(state.data.schema_registry_copy_files).forEach(([source, dest]) => {
                    if (source) lines.push(`      - { source_path: "${source}", destination_path: "${dest}" }`);
                });
            }
            if (Object.keys(state.data.kafka_connect_copy_files).length > 0) {
                lines.push('    kafka_connect_copy_files:');
                Object.entries(state.data.kafka_connect_copy_files).forEach(([source, dest]) => {
                    if (source) lines.push(`      - { source_path: "${source}", destination_path: "${dest}" }`);
                });
            }
            if (Object.keys(state.data.ksql_copy_files).length > 0) {
                lines.push('    ksql_copy_files:');
                Object.entries(state.data.ksql_copy_files).forEach(([source, dest]) => {
                    if (source) lines.push(`      - { source_path: "${source}", destination_path: "${dest}" }`);
                });
            }
            if (Object.keys(state.data.kafka_rest_copy_files).length > 0) {
                lines.push('    kafka_rest_copy_files:');
                Object.entries(state.data.kafka_rest_copy_files).forEach(([source, dest]) => {
                    if (source) lines.push(`      - { source_path: "${source}", destination_path: "${dest}" }`);
                });
            }
            if (Object.keys(state.data.control_center_next_gen_copy_files).length > 0) {
                lines.push('    control_center_next_gen_copy_files:');
                Object.entries(state.data.control_center_next_gen_copy_files).forEach(([source, dest]) => {
                    if (source) lines.push(`      - { source_path: "${source}", destination_path: "${dest}" }`);
                });
            }

            if (state.data.health_checks_enabled) {
                lines.push('    health_checks_enabled: true');
            }

            if ((state.data.confluent_license || state.data.secrets_protection_enabled || state.data.telemetry_enabled ||
                state.data.audit_logs_destination_enabled || state.data.logredactor_enabled ||
                state.data.ccloud_kafka_enabled || state.data.ccloud_schema_registry_enabled ||
                Object.keys(state.data.copy_files || {}).length > 0 || state.data.health_checks_enabled) &&
                (state.data.components.schema_registry || state.data.components.kafka_connect ||
                 state.data.components.control_center_next_gen || state.data.components.ksql)) {
                lines.push('');
            }

            lines.push('  # === Component Host Groups ===');
            lines.push('kafka_controller:');
            lines.push('  hosts:');
            (state.data.hosts.kafka_controller || []).forEach(host => {
                if (host.hostname) {
                    lines.push(`    ${host.hostname}:`);
                    if (host.ansible_host) lines.push(`      ansible_host: ${host.ansible_host}`);
                    if (host.node_id) lines.push(`      node_id: ${host.node_id}`);
                    if (host.node_ip) lines.push(`      node_ip: ${host.node_ip}`);
                }
            });
            lines.push('');

            lines.push('kafka_broker:');
            lines.push('  hosts:');
            (state.data.hosts.kafka_broker || []).forEach(host => {
                if (host.hostname) {
                    lines.push(`    ${host.hostname}:`);
                    if (host.ansible_host) lines.push(`      ansible_host: ${host.ansible_host}`);
                    if (host.broker_id) lines.push(`      broker_id: ${host.broker_id}`);
                    if (host.broker_ip) lines.push(`      broker_ip: ${host.broker_ip}`);
                }
            });
            lines.push('');

            if (state.data.components.schema_registry && state.data.hosts.schema_registry && state.data.hosts.schema_registry.length > 0) {
                lines.push('schema_registry:');
                lines.push('  hosts:');
                state.data.hosts.schema_registry.forEach(host => {
                    if (host.hostname) {
                        lines.push(`    ${host.hostname}:`);
                        if (host.ansible_host) lines.push(`      ansible_host: ${host.ansible_host}`);
                    }
                });
                lines.push('');
            }

            if (state.data.components.control_center_next_gen && state.data.hosts.control_center_next_gen && state.data.hosts.control_center_next_gen.length > 0) {
                lines.push('control_center_next_gen:');
                lines.push('  hosts:');
                state.data.hosts.control_center_next_gen.forEach(host => {
                    if (host.hostname) {
                        lines.push(`    ${host.hostname}:`);
                        if (host.ansible_host) lines.push(`      ansible_host: ${host.ansible_host}`);
                    }
                });
                lines.push('');
            }

            if (state.data.components.kafka_connect && state.data.hosts.kafka_connect && Object.keys(state.data.hosts.kafka_connect).length > 0) {
                lines.push('kafka_connect:');
                lines.push('  hosts:');
                Object.entries(state.data.hosts.kafka_connect).forEach(([hostname, hostData]) => {
                    if (hostname) {
                        lines.push(`    ${hostname}:`);
                        if (hostData && hostData.ansible_host) lines.push(`      ansible_host: ${hostData.ansible_host}`);
                    }
                });
                lines.push('');
            }

            if (state.data.components.ksql && state.data.hosts.ksql && Object.keys(state.data.hosts.ksql).length > 0) {
                lines.push('ksql:');
                lines.push('  hosts:');
                Object.entries(state.data.hosts.ksql).forEach(([hostname, hostData]) => {
                    if (hostname) {
                        lines.push(`    ${hostname}:`);
                        if (hostData && hostData.ansible_host) lines.push(`      ansible_host: ${hostData.ansible_host}`);
                    }
                });
                lines.push('');
            }

            if (state.data.components.kafka_rest && state.data.hosts.kafka_rest && state.data.hosts.kafka_rest.length > 0) {
                lines.push('kafka_rest:');
                lines.push('  hosts:');
                state.data.hosts.kafka_rest.forEach(host => {
                    if (host.hostname) {
                        lines.push(`    ${host.hostname}:`);
                        if (host.ansible_host) lines.push(`      ansible_host: ${host.ansible_host}`);
                    }
                });
                lines.push('');
            }

            return lines.join('\n');
        }

        function updateYamlPreview() {
            const yaml = generateYaml();
            const preview = document.getElementById('yamlPreview');

            const highlighted = yaml
                .split('\n')
                .map(line => {
                    if (line.startsWith('#')) {
                        return `<span class="yaml-comment">${escapeHtml(line)}</span>`;
                    }
                    const match = line.match(/^(\s*)([a-zA-Z_][a-zA-Z0-9_]*):\s*(.*)$/);
                    if (match) {
                        const [_, indent, key, value] = match;
                        let valueHtml = value;
                        if (value.startsWith('"') && value.endsWith('"')) {
                            valueHtml = `<span class="yaml-string">${escapeHtml(value)}</span>`;
                        } else if (value === 'true' || value === 'false' || /^\d+$/.test(value)) {
                            valueHtml = `<span class="yaml-value">${escapeHtml(value)}</span>`;
                        } else if (value) {
                            valueHtml = `<span class="yaml-value">${escapeHtml(value)}</span>`;
                        }
                        return `${indent}<span class="yaml-key">${key}</span>: ${valueHtml}`;
                    }
                    return escapeHtml(line);
                })
                .join('\n');

            preview.innerHTML = highlighted;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        document.getElementById('copyYaml').addEventListener('click', copyYaml);
        document.getElementById('downloadYaml').addEventListener('click', downloadYaml);
        document.getElementById('copyYamlBtn').addEventListener('click', copyYaml);
        document.getElementById('downloadYamlBtn').addEventListener('click', downloadYaml);
        document.getElementById('exportPng').addEventListener('click', exportPng);
        document.getElementById('resetAll').addEventListener('click', resetAll);

        function copyYaml() {
            const yaml = generateYaml();
            navigator.clipboard.writeText(yaml).then(() => {
                showToast('YAML이 클립보드에 복사되었습니다');
            });
        }

        function downloadYaml() {
            const yaml = generateYaml();
            const blob = new Blob([yaml], { type: 'text/yaml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'hosts.yml';
            a.click();
            URL.revokeObjectURL(url);
            showToast('YAML이 다운로드되었습니다');
        }

        function exportPng() {
            const element = document.querySelector('.main');
            html2canvas(element, {
                scale: 2,
                backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg')
            }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL();
                link.download = 'hosts-config.png';
                link.click();
                showToast('PNG이 다운로드되었습니다');
            });
        }

        function resetAll() {
            if (confirm('모든 설정을 초기화하시겠습니까?')) {
                state.currentStep = 1;
                state.completedSteps.clear();
                // Reset state.data to initial values
                location.reload();
            }
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================
        loadTheme();
        renderStepBar();
        renderStepContent();
        updateYamlPreview();
    </script>
</body>
