    install_java: false
    custom_java_path: /usr/lib/jvm/java-17-openjdk
    sasl_protocol: plain
    kafka_controller_sasl_protocol: plain

    #SSL Config
    #keystore_expiration_days: 365
    #certificate_authority_expiration_days: 365
    ssl_file_dir: /app/sol/kafka/confluent/etc/ssl
    ssl_keystore_and_truststore_custom_password: true
    ssl_enabled: true
      #kafka_controller_ssl_enabled: true
      #control_center_next_gen_ssl_enabled: true
      #schema_registry_ssl_enabled: true
      #kafka_broker_rest_ssl_enabled: true      #mds
     
    ssl_client_authentication: required
    ssl_mutual_auth_enabled: true

    kafka_controller_keystore_storepass: changeit
    kafka_controller_keystore_keypass: changeit
    kafka_controller_truststore_storepass: changeit
    kafka_broker_keystore_storepass: changeit
    kafka_broker_keystore_keypass: changeit
    kafka_broker_truststore_storepass: changeit
    schema_registry_keystore_storepass: changeit
    schema_registry_keystore_keypass: changeit
    schema_registry_truststore_storepass: changeit
    control_center_next_gen_keystore_storepass: changeit
